</head>
<body>
  <main id="routeApp" class="app">
    <div id="map"></div>
    <div id="mapFallback" class="map-fallback" hidden>
      <div class="fallback-inner">
        <strong>地图资源暂时没有加载出来</strong>
        <p>路线、天数、景点卡片和播放控制仍然可以预览；联网后重新打开即可看到真实地图底图。</p>
      </div>
    </div>

    <div id="mapChip" class="map-chip" aria-live="polite"></div>

    <section class="shell" aria-label="鸟取、岛根和山口自驾路线广度预览">
      <header class="topbar">
        <div class="title-block">
          <p class="eyebrow">San'in Road Trip Preview</p>
          <h1>鸟取・岛根・山口自驾游广度版</h1>
        </div>
        <div class="route-meta">
          <span class="meta-pill">7 天候选</span>
          <span class="meta-pill">约 900 km+</span>
          <span class="meta-pill">鸟取进 / 下关或山口出</span>
          <a class="meta-pill" href="#map">全地点地图</a>
          <button id="pinToggleBtn" class="meta-pill pin-pill" type="button">气泡 P</button>
          <button id="visitorBtn" class="meta-pill visitor-pill" type="button">访客：设置名字</button>
        </div>
      </header>

      <aside class="side-panel">
        <nav id="dayTabs" class="day-tabs" aria-label="选择行程天数"></nav>
        <div id="daySummary" class="day-summary"></div>
        <div id="stopList" class="stop-list"></div>
      </aside>

      <article id="detailPanel" class="detail-panel" aria-live="polite"></article>

      <footer class="player">
        <div class="controls" aria-label="路线播放控制">
          <button id="prevBtn" class="icon-btn" type="button" title="上一个停靠点" aria-label="上一个停靠点">‹</button>
          <button id="playBtn" class="icon-btn primary" type="button" title="播放路线" aria-label="播放路线">▶</button>
          <button id="nextBtn" class="icon-btn" type="button" title="下一个停靠点" aria-label="下一个停靠点">›</button>
          <button id="resetBtn" class="icon-btn" type="button" title="回到起点" aria-label="回到起点">↺</button>
        </div>

        <div class="timeline-wrap">
          <div id="timelineHead" class="timeline-head"></div>
          <input id="scrubber" class="scrubber" type="range" min="0" max="0" value="0" step="1" aria-label="路线进度">
          <div id="miniStops" class="mini-stops"></div>
        </div>

        <div class="player-tools">
          <select id="speedSelect" class="select" aria-label="播放速度">
            <option value="1800">舒缓</option>
            <option value="1100" selected>标准</option>
            <option value="650">快速</option>
          </select>
        </div>
      </footer>
    </section>
  </main>

  <main id="placesApp" class="map-page" hidden>
    <div id="placesMap"></div>
    <section class="places-shell" aria-label="全地点地图预览">
      <aside class="places-panel">
        <header class="places-head">
          <p class="eyebrow">All Places Map</p>
          <h1>全地点地图</h1>
          <div class="places-nav">
            <a class="meta-pill" href="#route">路线预览</a>
            <span id="placesCount" class="meta-pill visitor-pill"></span>
            <button id="placesPinToggleBtn" class="meta-pill pin-pill" type="button">气泡 P</button>
          </div>
        </header>
        <nav id="placesFilter" class="places-filter" aria-label="按天筛选地点"></nav>
        <div id="placesList" class="places-list"></div>
      </aside>
      <div id="placesChip" class="places-chip"></div>
      <article id="placesCard" class="places-card" hidden></article>
    </section>
  </main>

  <div id="annotationLayer" class="annotation-layer"></div>
  <div id="annotationToolbar" class="annotation-toolbar" hidden>
    <button id="pinUiModeBtn" class="pin-mode-btn" type="button">贴 UI</button>
    <button id="pinMapModeBtn" class="pin-mode-btn" type="button">贴地图</button>
    <button id="pinCloseBtn" class="pin-mode-btn" type="button">关闭</button>
  </div>
  <article id="annotationCard" class="annotation-card" aria-live="polite" hidden></article>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./trip-data.js"></script>
  <script>
    const { routeDays: ROUTE_DAYS, photoGradients: PHOTO_GRADIENTS } = window.TRIP_DATA;
    const COMMENT_KEY = "sanin-yamaguchi-roadtrip-comments-v1";
    const ANNOTATION_KEY = "sanin-yamaguchi-roadtrip-annotations-v1";
    const VISITOR_KEY = "sanin-yamaguchi-roadtrip-visitor-v1";
    const SYNC_ENDPOINT = "https://script.google.com/macros/s/AKfycbzFipxrcrVtDg1XMtVA0Cs0oARuNnMlteLeShhlTZtcPzPzea_QA9Wp5-fgjbT7PSd-hg/exec";
    const SYNC_REFRESH_MS = 45000;
    const COMMENT_COLORS = ["#22c55e", "#f59e0b", "#ef4444", "#3b82f6", "#8b5cf6"];

    const initialVisitor = loadVisitor();

    const state = {
      page: pageFromHash(),
      dayIndex: 0,
      stopIndex: 0,
      playing: false,
      timer: null,
      mapReady: false,
      map: null,
      routeLines: [],
      progressLine: null,
      markers: [],
      movingMarker: null,
      comments: loadComments(initialVisitor),
      visitor: initialVisitor,
      syncStatus: "",
      editingCommentId: null
    };

    const annotationState = {
      items: loadAnnotations(initialVisitor),
      enabled: false,
      mode: "ui",
      activeId: "",
      routeMarkers: [],
      placesMarkers: [],
      routeLayer: null,
      placesLayer: null,
      syncStatus: ""
    };

    const placesState = {
      map: null,
      mapReady: false,
      lines: [],
      markers: [],
      activeDay: "all",
      activeKey: ""
    };

    const els = {
      routeApp: document.getElementById("routeApp"),
      placesApp: document.getElementById("placesApp"),
      dayTabs: document.getElementById("dayTabs"),
      daySummary: document.getElementById("daySummary"),
      stopList: document.getElementById("stopList"),
      detailPanel: document.getElementById("detailPanel"),
      timelineHead: document.getElementById("timelineHead"),
      scrubber: document.getElementById("scrubber"),
      miniStops: document.getElementById("miniStops"),
      playBtn: document.getElementById("playBtn"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      resetBtn: document.getElementById("resetBtn"),
      speedSelect: document.getElementById("speedSelect"),
      mapChip: document.getElementById("mapChip"),
      mapFallback: document.getElementById("mapFallback"),
      visitorBtn: document.getElementById("visitorBtn"),
      pinToggleBtn: document.getElementById("pinToggleBtn"),
      annotationLayer: document.getElementById("annotationLayer"),
      annotationToolbar: document.getElementById("annotationToolbar"),
      annotationCard: document.getElementById("annotationCard"),
      pinUiModeBtn: document.getElementById("pinUiModeBtn"),
      pinMapModeBtn: document.getElementById("pinMapModeBtn"),
      pinCloseBtn: document.getElementById("pinCloseBtn")
    };

    const placesEls = {
      filter: document.getElementById("placesFilter"),
      list: document.getElementById("placesList"),
      card: document.getElementById("placesCard"),
      chip: document.getElementById("placesChip"),
      count: document.getElementById("placesCount"),
      pinToggleBtn: document.getElementById("placesPinToggleBtn")
    };

    function pageFromHash() {
      return location.hash === "#map" || location.hash === "#places" ? "map" : "route";
    }

    function initMap() {
      if (state.mapReady) return;
      if (!window.L) {
        els.mapFallback.hidden = false;
        return;
      }

      state.map = L.map("map", {
        zoomControl: false,
        scrollWheelZoom: true
      }).setView([35.37, 133.35], 9);

      L.control.zoom({ position: "bottomright" }).addTo(state.map);

      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 18,
        attribution: "&copy; OpenStreetMap"
      }).addTo(state.map);

      const annotationPane = state.map.createPane("routeAnnotationPane");
      annotationPane.style.zIndex = 680;
      annotationPane.style.pointerEvents = "auto";
      annotationState.routeLayer = L.layerGroup().addTo(state.map);

      state.map.getContainer().addEventListener("click", event => {
        createMapAnnotationFromMapEvent(event, state.map, "route");
      });

      state.mapReady = true;
      drawMap();
    }

    function day() {
      return ROUTE_DAYS[state.dayIndex];
    }

    function stop() {
      return day().stops[state.stopIndex];
    }

    function stopKey(dayIndex = state.dayIndex, stopIndex = state.stopIndex) {
      return `${ROUTE_DAYS[dayIndex].day}-${stopIndex}`;
    }

    function loadComments(visitor) {
      try {
        return normalizeLocalComments(JSON.parse(localStorage.getItem(COMMENT_KEY)) || {}, visitor);
      } catch (error) {
        return {};
      }
    }

    function loadAnnotations(visitor) {
      try {
        return normalizeAnnotations(JSON.parse(localStorage.getItem(ANNOTATION_KEY)) || [], visitor);
      } catch (error) {
        return [];
      }
    }

    function hashText(value) {
      let hash = 0;
      for (let index = 0; index < value.length; index += 1) {
        hash = ((hash << 5) - hash) + value.charCodeAt(index);
        hash |= 0;
      }
      return Math.abs(hash).toString(36);
    }

    function normalizeLocalComments(comments, visitor) {
      Object.entries(comments || {}).forEach(([routeKey, items]) => {
        comments[routeKey] = (items || []).map(comment => {
          const stableSeed = `${routeKey}|${comment.createdAt || ""}|${comment.visitorId || ""}|${comment.name || ""}|${comment.color || ""}|${comment.text || ""}`;
          return {
            ...comment,
            id: comment.id || `local-${hashText(stableSeed)}`,
            visitorId: (!comment.visitorId || comment.visitorId === "legacy-local") ? visitor.id : comment.visitorId,
            createdAt: comment.createdAt || new Date().toISOString()
          };
        });
      });
      return comments || {};
    }

    function normalizeAnnotations(items, visitor) {
      return (items || []).map(item => ({
        id: item.id || `annotation-${hashText(`${item.createdAt || ""}|${item.text || ""}|${item.x || ""}|${item.lat || ""}`)}`,
        visitorId: item.visitorId || visitor.id,
        name: item.name || "未署名",
        text: item.text || "已标记",
        color: item.color || COMMENT_COLORS[0],
        target: item.target === "map" ? "map" : "ui",
        page: item.page === "map" ? "map" : "route",
        mapId: item.mapId === "places" ? "places" : "route",
        x: Number(item.x || 50),
        y: Number(item.y || 50),
        lat: item.lat === "" || item.lat === undefined ? "" : Number(item.lat),
        lng: item.lng === "" || item.lng === undefined ? "" : Number(item.lng),
        createdAt: item.createdAt || new Date().toISOString(),
        updatedAt: item.updatedAt || ""
      }));
    }

    function createVisitorId() {
      if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return `visitor-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function loadVisitor() {
      try {
        const visitor = JSON.parse(localStorage.getItem(VISITOR_KEY)) || {};
        return {
          id: visitor.id || createVisitorId(),
          name: visitor.name || ""
        };
      } catch (error) {
        return {
          id: createVisitorId(),
          name: ""
        };
      }
    }

    function saveVisitor() {
      localStorage.setItem(VISITOR_KEY, JSON.stringify(state.visitor));
      renderVisitor();
    }

    function renderVisitor() {
      if (!els.visitorBtn) return;
      els.visitorBtn.textContent = state.visitor.name ? `访客：${state.visitor.name}` : "访客：设置名字";
      els.visitorBtn.title = state.visitor.name ? "切换访客名字" : "设置访客名字";
    }

    function setVisitorName(name) {
      const nextName = name.trim();
      if (!nextName) return;
      state.visitor = {
        ...state.visitor,
        name: nextName
      };
      saveVisitor();
    }

    function saveComments() {
      localStorage.setItem(COMMENT_KEY, JSON.stringify(state.comments));
    }

    function saveAnnotations() {
      localStorage.setItem(ANNOTATION_KEY, JSON.stringify(annotationState.items));
    }

    function syncEnabled() {
      return SYNC_ENDPOINT.trim().startsWith("https://script.google.com/");
    }

    function commentIdentity(routeKey, comment) {
      return comment.id || `${routeKey}|${comment.createdAt}|${comment.visitorId || ""}|${comment.name}|${comment.color}|${comment.text}`;
    }

    function mergeCommentMaps(primary, secondary) {
      const merged = {};
      const allKeys = new Set([...Object.keys(primary || {}), ...Object.keys(secondary || {})]);
      allKeys.forEach(key => {
        const seen = new Set();
        merged[key] = [...(primary[key] || []), ...(secondary[key] || [])]
          .filter(comment => {
            const id = commentIdentity(key, comment);
            if (seen.has(id)) return false;
            seen.add(id);
            return true;
          })
          .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      });
      return merged;
    }

    function jsonpRequest(params) {
      return new Promise((resolve, reject) => {
        if (!syncEnabled()) {
          reject(new Error("Sync endpoint is not configured."));
          return;
        }

        const callbackName = `roadtripSync_${Date.now()}_${Math.random().toString(16).slice(2)}`;
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("Google Sheet sync did not respond. Check Apps Script access settings."));
        }, 12000);
        const url = new URL(SYNC_ENDPOINT);
        url.searchParams.set("callback", callbackName);
        Object.entries(params).forEach(([key, value]) => {
          url.searchParams.set(key, typeof value === "string" ? value : JSON.stringify(value));
        });

        const cleanup = () => {
          window.clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        };

        window[callbackName] = data => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("Google Sheet sync request failed."));
        };

        script.src = url.toString();
        document.body.appendChild(script);
      });
    }

    function normalizeRemoteComments(rows) {
      const grouped = {};
      (rows || []).forEach(row => {
        if (!row.routeKey) return;
        if (!grouped[row.routeKey]) grouped[row.routeKey] = [];
        grouped[row.routeKey].push({
          id: row.id || "",
          visitorId: row.visitorId || "",
          name: row.name || "未署名",
          text: row.text || "已标记",
          color: row.color || COMMENT_COLORS[0],
          createdAt: row.createdAt || new Date().toISOString()
        });
      });
      return grouped;
    }

    function normalizeRemoteAnnotations(rows) {
      return normalizeAnnotations((rows || []).filter(row => row.id), state.visitor);
    }

    function assertSyncResponse(response) {
      if (response && response.ok === false) {
        throw new Error(response.error || "Google Sheet sync returned an error.");
      }
      return response;
    }

    function commentsMissingFromRemote(localComments, remoteComments) {
      const missing = [];
      Object.entries(localComments || {}).forEach(([routeKey, items]) => {
        const remoteIds = new Set((remoteComments[routeKey] || []).map(comment => commentIdentity(routeKey, comment)));
        (items || []).forEach(comment => {
          if (comment.visitorId === state.visitor.id && !remoteIds.has(commentIdentity(routeKey, comment))) {
            missing.push({ routeKey, comment });
          }
        });
      });
      return missing;
    }

    function ownLocalComments(localComments) {
      const own = {};
      Object.entries(localComments || {}).forEach(([routeKey, items]) => {
        const filtered = (items || []).filter(comment => comment.visitorId === state.visitor.id);
        if (filtered.length) own[routeKey] = filtered;
      });
      return own;
    }

    function annotationIdentity(item) {
      return item.id || `${item.createdAt}|${item.visitorId}|${item.text}|${item.target}|${item.x}|${item.lat}`;
    }

    function mergeAnnotations(remoteItems, localItems) {
      const seen = new Set();
      return [...(remoteItems || []), ...(localItems || [])]
        .filter(item => {
          const id = annotationIdentity(item);
          if (seen.has(id)) return false;
          seen.add(id);
          return true;
        })
        .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
    }

    function ownLocalAnnotations(items) {
      return (items || []).filter(item => item.visitorId === state.visitor.id);
    }

    function annotationsMissingFromRemote(localItems, remoteItems) {
      const remoteIds = new Set((remoteItems || []).map(annotationIdentity));
      return (localItems || []).filter(item => {
        return item.visitorId === state.visitor.id && !remoteIds.has(annotationIdentity(item));
      });
    }

    function routeInfoFromKey(routeKey) {
      const match = routeKey.match(/^Day (\d+)-(\d+)$/);
      const dayIndex = match ? Number(match[1]) - 1 : 0;
      const stopIndex = match ? Number(match[2]) : 0;
      const currentDay = ROUTE_DAYS[dayIndex] || ROUTE_DAYS[0];
      const currentStop = currentDay.stops[stopIndex] || currentDay.stops[0];
      return { currentDay, stopIndex, currentStop };
    }

    async function uploadMissingLocalComments(remoteComments) {
      const missing = commentsMissingFromRemote(state.comments, remoteComments);
      if (!missing.length) return;

      state.syncStatus = `正在补传 ${missing.length} 条本机记录`;
      renderDetail();

      for (const item of missing) {
        const info = routeInfoFromKey(item.routeKey);
        assertSyncResponse(await jsonpRequest({
          action: "add",
          id: item.comment.id,
          routeKey: item.routeKey,
          day: info.currentDay.day,
          dayTitle: info.currentDay.title,
          stopIndex: info.stopIndex,
          stopName: info.currentStop.name,
          visitorId: item.comment.visitorId,
          name: item.comment.name,
          color: item.comment.color,
          text: item.comment.text,
          createdAt: item.comment.createdAt
        }));
      }
    }

    async function refreshSyncedComments() {
      if (!syncEnabled()) {
        state.syncStatus = "本机记录";
        return;
      }

      try {
        const response = await jsonpRequest({ action: "list" });
        const remote = normalizeRemoteComments(response.rows);
        await uploadMissingLocalComments(remote);
        state.comments = mergeCommentMaps(remote, ownLocalComments(state.comments));
        saveComments();
        state.syncStatus = "Google Sheet 已同步";
        render();
      } catch (error) {
        state.syncStatus = "同步失败，已保留本机记录";
        renderDetail();
      }
    }

    async function syncAnnotation(action, item) {
      if (!syncEnabled()) return;

      const response = await jsonpRequest({
        action,
        id: item.id,
        createdAt: item.createdAt,
        updatedAt: item.updatedAt || "",
        visitorId: item.visitorId,
        name: item.name,
        color: item.color,
        text: item.text,
        target: item.target,
        page: item.page,
        mapId: item.mapId,
        x: item.x,
        y: item.y,
        lat: item.lat,
        lng: item.lng
      });
      if (!response || response.kind !== "annotations") throw new Error("annotations_not_supported");
      assertSyncResponse(response);
      annotationState.syncStatus = "Google Sheet 已同步";
    }

    async function uploadMissingLocalAnnotations(remoteItems) {
      const missing = annotationsMissingFromRemote(annotationState.items, remoteItems);
      if (!missing.length) return;

      for (const item of missing) {
        await syncAnnotation("addAnnotation", item);
      }
    }

    async function refreshSyncedAnnotations() {
      if (!syncEnabled()) {
        annotationState.syncStatus = "本机记录";
        return;
      }

      try {
        const response = await jsonpRequest({ action: "listAnnotations" });
        if (!response || response.kind !== "annotations") throw new Error("annotations_not_supported");
        const remote = normalizeRemoteAnnotations(response.rows);
        await uploadMissingLocalAnnotations(remote);
        annotationState.items = mergeAnnotations(remote, ownLocalAnnotations(annotationState.items));
        saveAnnotations();
        annotationState.syncStatus = "Google Sheet 已同步";
        renderAnnotations();
      } catch (error) {
        annotationState.syncStatus = "气泡同步失败，已保留本机记录";
      }
    }

    async function syncComment(routeKey, comment, currentDay, currentStop, item) {
      if (!syncEnabled()) return;

      try {
        assertSyncResponse(await jsonpRequest({
          action: "add",
          id: comment.id,
          routeKey,
          day: currentDay.day,
          dayTitle: currentDay.title,
          stopIndex: currentStop,
          stopName: item.name,
          visitorId: comment.visitorId,
          name: comment.name,
          color: comment.color,
          text: comment.text,
          createdAt: comment.createdAt
        }));
        state.syncStatus = "Google Sheet 已同步";
        window.setTimeout(refreshSyncedComments, 900);
      } catch (error) {
        state.syncStatus = "同步失败，已保留本机记录";
        renderDetail();
      }
    }

    async function syncCommentChange(action, payload) {
      if (!syncEnabled()) return;

      try {
        const response = assertSyncResponse(await jsonpRequest({
          action,
          id: payload.comment.id,
          visitorId: state.visitor.id,
          routeKey: payload.routeKey,
          name: payload.comment.name,
          color: payload.comment.color,
          text: payload.comment.text,
          updatedAt: payload.comment.updatedAt || new Date().toISOString()
        }));
        if (action === "delete" && response.deleted === false) {
          throw new Error("remote_comment_not_found");
        }
        state.syncStatus = "Google Sheet 已同步";
        window.setTimeout(refreshSyncedComments, 900);
      } catch (error) {
        state.syncStatus = "同步失败，已保留本机记录";
        renderDetail();
        throw error;
      }
    }

    async function syncAnnotationChange(action, item) {
      try {
        await syncAnnotation(action, item);
        window.setTimeout(refreshSyncedAnnotations, 900);
      } catch (error) {
        annotationState.syncStatus = "气泡同步失败，已保留本机记录";
        throw error;
      }
    }

    function canEditComment(comment) {
      return comment.visitorId === state.visitor.id;
    }

    function canEditAnnotation(item) {
      return item.visitorId === state.visitor.id;
    }

    function commentsFor(dayIndex = state.dayIndex, stopIndex = state.stopIndex) {
      return state.comments[stopKey(dayIndex, stopIndex)] || [];
    }

    function latestComment(dayIndex = state.dayIndex, stopIndex = state.stopIndex) {
      const items = commentsFor(dayIndex, stopIndex);
      return items.length ? items[items.length - 1] : null;
    }

    function colorForStop(dayIndex = state.dayIndex, stopIndex = state.stopIndex) {
      const item = latestComment(dayIndex, stopIndex);
      return item ? item.color : null;
    }

    function updateLocalComment(routeKey, commentId, updater) {
      state.comments[routeKey] = (state.comments[routeKey] || []).map(comment => {
        if (comment.id !== commentId || !canEditComment(comment)) return comment;
        return updater(comment);
      });
      saveComments();
    }

    function removeLocalComment(routeKey, commentId) {
      state.comments[routeKey] = (state.comments[routeKey] || []).filter(comment => {
        return comment.id !== commentId || !canEditComment(comment);
      });
      saveComments();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function googleMapsUrl(item) {
      const query = encodeURIComponent(`${item.place || item.name} ${item.lat},${item.lng}`);
      return `https://www.google.com/maps/search/?api=1&query=${query}`;
    }

    function allStops() {
      return ROUTE_DAYS.flatMap((routeDay, dayIndex) => {
        return routeDay.stops.map((item, stopIndex) => ({
          ...item,
          key: stopKey(dayIndex, stopIndex),
          routeDay,
          dayIndex,
          stopIndex
        }));
      });
    }

    function visiblePlaces() {
      const stops = allStops();
      if (placesState.activeDay === "all") return stops;
      return stops.filter(item => item.dayIndex === Number(placesState.activeDay));
    }

    function currentPlace() {
      return allStops().find(item => item.key === placesState.activeKey);
    }

    function formatCommentTime(value) {
      return new Intl.DateTimeFormat("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(value));
    }

    function markerIcon(label, active, commentColor) {
      const fill = active ? (commentColor || day().color) : (commentColor || "var(--road)");
      return L.divIcon({
        className: "",
        html: `<div class="custom-marker${active ? " active" : ""}" style="background:${fill}">${label}</div>`,
        iconSize: active ? [40, 40] : [30, 30],
        iconAnchor: active ? [20, 20] : [15, 15]
      });
    }

    function annotationIcon(item, active) {
      return L.divIcon({
        className: "",
        html: `<div class="annotation-marker${active ? " active" : ""}" style="--pin-color:${item.color}">P</div>`,
        iconSize: active ? [34, 34] : [28, 28],
        iconAnchor: active ? [8, 32] : [7, 26]
      });
    }

    function movingIcon() {
      return L.divIcon({
        className: "",
        html: '<div class="moving-marker">›</div>',
        iconSize: [34, 34],
        iconAnchor: [17, 17]
      });
    }

    function drawMap() {
      if (!state.mapReady) return;

      state.routeLines.forEach(line => line.remove());
      state.markers.forEach(marker => marker.remove());
      if (state.progressLine) state.progressLine.remove();
      if (state.movingMarker) state.movingMarker.remove();

      state.routeLines = [];
      state.markers = [];

      ROUTE_DAYS.forEach((routeDay, index) => {
        const coords = routeDay.stops.map(item => [item.lat, item.lng]);
        const line = L.polyline(coords, {
          color: routeDay.color,
          weight: index === state.dayIndex ? 6 : 3,
          opacity: index === state.dayIndex ? 0.78 : 0.28,
          dashArray: index === state.dayIndex ? null : "6 10"
        }).addTo(state.map);
        state.routeLines.push(line);
      });

      day().stops.forEach((item, index) => {
        const commentColor = colorForStop(state.dayIndex, index);
        const marker = L.marker([item.lat, item.lng], {
          icon: markerIcon(index + 1, index === state.stopIndex, commentColor),
          title: item.name
        }).addTo(state.map);

        marker.on("click", event => {
          if (event.originalEvent) L.DomEvent.stop(event.originalEvent);
          pause();
          state.stopIndex = index;
          render();
        });

        state.markers.push(marker);
      });

      const coords = progressCoords();
      state.progressLine = L.polyline(coords, {
        color: day().color,
        weight: 8,
        opacity: 0.92
      }).addTo(state.map);

      const current = stop();
      state.movingMarker = L.marker([current.lat, current.lng], {
        icon: movingIcon(),
        zIndexOffset: 200
      }).addTo(state.map);

      const bounds = L.latLngBounds(day().stops.map(item => [item.lat, item.lng]));
      const isCompact = window.matchMedia("(max-width: 860px)").matches;
      state.map.fitBounds(bounds, {
        paddingTopLeft: isCompact ? [28, 28] : [390, 110],
        paddingBottomRight: isCompact ? [28, 28] : [390, 110],
        animate: true,
        duration: 0.6
      });

      setTimeout(() => {
        state.map.flyTo([current.lat, current.lng], isCompact ? Math.max(state.map.getZoom(), 8) : Math.max(state.map.getZoom(), 10), {
          animate: true,
          duration: 0.8
        });
      }, 200);

      renderAnnotations();
    }

    function initPlacesMap() {
      if (placesState.mapReady) return;
      if (!window.L) return;

      placesState.map = L.map("placesMap", {
        zoomControl: false,
        scrollWheelZoom: true
      }).setView([35.1, 132.6], 8);

      L.control.zoom({ position: "bottomright" }).addTo(placesState.map);
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 18,
        attribution: "&copy; OpenStreetMap"
      }).addTo(placesState.map);

      const annotationPane = placesState.map.createPane("placesAnnotationPane");
      annotationPane.style.zIndex = 680;
      annotationPane.style.pointerEvents = "auto";
      annotationState.placesLayer = L.layerGroup().addTo(placesState.map);

      placesState.map.getContainer().addEventListener("click", event => {
        createMapAnnotationFromMapEvent(event, placesState.map, "places");
      });

      placesState.mapReady = true;
      drawPlacesMap();
    }

    function drawPlacesMap() {
      if (!placesState.mapReady) return;

      placesState.lines.forEach(line => line.remove());
      placesState.markers.forEach(marker => marker.remove());
      placesState.lines = [];
      placesState.markers = [];

      ROUTE_DAYS.forEach(routeDay => {
        const coords = routeDay.stops.map(item => [item.lat, item.lng]);
        const line = L.polyline(coords, {
          color: routeDay.color,
          weight: 3,
          opacity: 0.28,
          dashArray: "6 10"
        }).addTo(placesState.map);
        placesState.lines.push(line);
      });

      const stops = visiblePlaces();
      stops.forEach(item => {
        const marker = L.marker([item.lat, item.lng], {
          icon: markerIcon(item.stopIndex + 1, placesState.activeKey === item.key, item.routeDay.color),
          title: item.name
        }).addTo(placesState.map);

        marker.on("click", event => {
          if (event.originalEvent) L.DomEvent.stop(event.originalEvent);
          selectPlace(item.key);
        });
        placesState.markers.push(marker);
      });

      const selected = currentPlace();
      if (selected) {
        placesState.map.flyTo([selected.lat, selected.lng], Math.max(placesState.map.getZoom(), 10), {
          animate: true,
          duration: 0.6
        });
        return;
      }

      if (stops.length) {
        const bounds = L.latLngBounds(stops.map(item => [item.lat, item.lng]));
        placesState.map.fitBounds(bounds, {
          padding: window.matchMedia("(max-width: 860px)").matches ? [28, 28] : [420, 80],
          animate: true,
          duration: 0.5
        });
      }

      renderAnnotations();
    }

    function progressCoords() {
      return day().stops.slice(0, state.stopIndex + 1).map(item => [item.lat, item.lng]);
    }

    function renderDayTabs() {
      els.dayTabs.innerHTML = ROUTE_DAYS.map((item, index) => `
        <button class="day-tab${index === state.dayIndex ? " active" : ""}" type="button" data-day="${index}">
          <strong>${item.day}</strong>
          <span>${item.short}</span>
        </button>
      `).join("");

      els.dayTabs.querySelectorAll(".day-tab").forEach(button => {
        button.addEventListener("click", () => {
          pause();
          state.dayIndex = Number(button.dataset.day);
          state.stopIndex = 0;
          render();
        });
      });
    }

    function renderSummary() {
      const currentDay = day();
      els.daySummary.innerHTML = `
        <h2>${currentDay.title}</h2>
        <p>${currentDay.summary}</p>
        <div class="day-stats">
          <div class="stat"><span>驾驶</span><strong>${currentDay.drive}</strong></div>
          <div class="stat"><span>距离</span><strong>${currentDay.distance}</strong></div>
          <div class="stat"><span>夜宿</span><strong>${currentDay.overnight}</strong></div>
        </div>
      `;
    }

    function renderStopList() {
      els.stopList.innerHTML = day().stops.map((item, index) => `
        <button class="stop-item${index === state.stopIndex ? " active" : ""}" type="button" data-stop="${index}" style="${colorForStop(state.dayIndex, index) ? `border-color:${colorForStop(state.dayIndex, index)}; background:rgba(255,255,255,.94);` : ""}">
          <span class="stop-index" style="background:${colorForStop(state.dayIndex, index) || (index === state.stopIndex ? day().color : "var(--road)")}">${index + 1}</span>
          <span class="stop-main">
            <span class="stop-topline">
              <span class="stop-time">${item.time}</span>
              <span class="stop-name">${item.name}</span>
            </span>
            <span class="stop-sub">${item.drive} · ${item.stay}</span>
          </span>
        </button>
      `).join("");

      els.stopList.querySelectorAll(".stop-item").forEach(button => {
        button.addEventListener("click", () => {
          pause();
          state.stopIndex = Number(button.dataset.stop);
          render();
        });
      });

      const active = els.stopList.querySelector(".stop-item.active");
      if (active) active.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }

    function renderDetail() {
      const item = stop();
      const tags = item.tags.map(tag => `<span>${tag}</span>`).join("");
      const currentComments = commentsFor();
      const editingComment = state.editingCommentId ? currentComments.find(comment => comment.id === state.editingCommentId && canEditComment(comment)) : null;
      const currentColor = colorForStop() || day().color;
      const mapsUrl = googleMapsUrl(item);
      const commentItems = currentComments.length
        ? currentComments.slice().reverse().map(comment => {
          const actions = canEditComment(comment) ? `
            <div class="comment-actions">
              <button class="comment-action" type="button" data-edit-comment="${escapeHtml(comment.id)}">修改</button>
              <button class="comment-action danger" type="button" data-delete-comment="${escapeHtml(comment.id)}">删除</button>
            </div>
          ` : "";
          return `
          <div class="comment-item" style="--comment-color:${comment.color}">
            <div class="comment-meta">
              <strong>${escapeHtml(comment.name)}</strong>
              <span>${formatCommentTime(comment.createdAt)}</span>
            </div>
            <p>${escapeHtml(comment.text)}</p>
            ${actions}
          </div>
        `;
        }).join("")
        : `<div class="comment-empty">还没有标记。选个颜色，留下名字和一句话就行。</div>`;
      const selectedColor = editingComment ? editingComment.color : COMMENT_COLORS[0];
      const colorOptions = COMMENT_COLORS.map(color => `
        <label title="标记颜色">
          <input type="radio" name="commentColor" value="${color}" ${color === selectedColor ? "checked" : ""}>
          <span class="color-dot" style="--comment-color:${color}"></span>
        </label>
      `).join("");
      els.detailPanel.innerHTML = `
        <div class="photo-strip" style="--photo:${PHOTO_GRADIENTS[state.dayIndex]}">
          <div class="photo-label">
            <strong><a class="map-link" href="${mapsUrl}" target="_blank" rel="noopener noreferrer" title="在 Google Maps 打开">${item.name}</a></strong>
            <span>${item.time}</span>
          </div>
        </div>
        <div class="detail-body">
          <div class="detail-meta">
            <span><a class="map-link" href="${mapsUrl}" target="_blank" rel="noopener noreferrer" title="在 Google Maps 打开">${item.place}</a></span>
            <span>${item.drive}</span>
            <span>${item.stay}</span>
            ${tags}
          </div>
          <p>${item.desc}</p>
          <div class="note" style="border-left-color:${currentColor}">${item.note}</div>
          <div class="comment-panel">
            <div class="comment-head">
              <strong>标记记录</strong>
              <span class="sync-status${syncEnabled() ? " online" : ""}">${state.syncStatus || (syncEnabled() ? "Google Sheet" : "本机记录")}</span>
              <span class="comment-count">${currentComments.length} 条</span>
            </div>
            <form id="commentForm" class="comment-form">
              <div class="comment-row">
                <input id="commentName" class="comment-input" type="text" maxlength="18" placeholder="名字，填一次会记住" value="${escapeHtml(editingComment ? editingComment.name : state.visitor.name)}">
                <div class="color-options">${colorOptions}</div>
              </div>
              <textarea id="commentText" class="comment-text" maxlength="80" placeholder="备注：必去 / 可删 / 备选 / 想住这里">${escapeHtml(editingComment ? editingComment.text : "")}</textarea>
              <button class="comment-submit" type="submit">${editingComment ? "保存修改" : "记录这个点"}</button>
              ${editingComment ? `<button id="cancelEditBtn" class="comment-cancel" type="button">取消修改</button>` : ""}
            </form>
            <div class="comment-list">${commentItems}</div>
          </div>
        </div>
      `;

      els.mapChip.innerHTML = `<strong>${day().day} · ${item.name}</strong><span>${item.time} / ${item.drive}</span>`;
      const form = document.getElementById("commentForm");
      if (form) form.addEventListener("submit", addComment);
      const cancelEditBtn = document.getElementById("cancelEditBtn");
      if (cancelEditBtn) {
        cancelEditBtn.addEventListener("click", () => {
          state.editingCommentId = null;
          renderDetail();
        });
      }
      document.querySelectorAll("[data-edit-comment]").forEach(button => {
        button.addEventListener("click", () => editComment(button.dataset.editComment));
      });
      document.querySelectorAll("[data-delete-comment]").forEach(button => {
        button.addEventListener("click", () => deleteComment(button.dataset.deleteComment));
      });
    }

    function renderTimeline() {
      const currentDay = day();
      const currentStop = stop();
      els.scrubber.max = currentDay.stops.length - 1;
      els.scrubber.value = state.stopIndex;
      els.timelineHead.innerHTML = `
        <strong>${currentStop.name}</strong>
        <span>${state.stopIndex + 1} / ${currentDay.stops.length} · ${currentDay.title}</span>
      `;
      els.miniStops.style.setProperty("--count", currentDay.stops.length);
      els.miniStops.innerHTML = currentDay.stops.map((_, index) => {
        const className = index === state.stopIndex ? "mini-stop active" : index < state.stopIndex ? "mini-stop done" : "mini-stop";
        return `<span class="${className}"></span>`;
      }).join("");
      els.playBtn.textContent = state.playing ? "Ⅱ" : "▶";
      els.playBtn.setAttribute("aria-label", state.playing ? "暂停路线" : "播放路线");
      els.playBtn.setAttribute("title", state.playing ? "暂停路线" : "播放路线");
    }

    function visibleUiAnnotations() {
      return annotationState.items.filter(item => item.target === "ui" && item.page === state.page);
    }

    function visibleMapAnnotations(mapId) {
      return annotationState.items.filter(item => item.target === "map" && item.mapId === mapId && item.lat !== "" && item.lng !== "");
    }

    function renderAnnotationControls() {
      const active = annotationState.enabled;
      els.pinToggleBtn.classList.toggle("active", active);
      placesEls.pinToggleBtn.classList.toggle("active", active);
      els.pinToggleBtn.textContent = active ? "气泡中" : "气泡 P";
      placesEls.pinToggleBtn.textContent = active ? "气泡中" : "气泡 P";
      els.annotationToolbar.hidden = !active;
      els.pinUiModeBtn.classList.toggle("active", annotationState.mode === "ui");
      els.pinMapModeBtn.classList.toggle("active", annotationState.mode === "map");
      els.annotationLayer.classList.toggle("placing-ui", active && annotationState.mode === "ui");
      document.body.classList.toggle("placing-map-pin", active && annotationState.mode === "map");
      [document.getElementById("map"), document.getElementById("placesMap")].forEach(mapEl => {
        if (mapEl) mapEl.style.cursor = active && annotationState.mode === "map" ? "crosshair" : "";
      });
    }

    function renderUiAnnotations() {
      els.annotationLayer.innerHTML = visibleUiAnnotations().map(item => `
        <button class="annotation-pin${annotationState.activeId === item.id ? " active" : ""}" type="button" data-annotation-id="${escapeHtml(item.id)}" style="left:${item.x}%; top:${item.y}%; --pin-color:${item.color}" title="${escapeHtml(item.text)}">P</button>
      `).join("");

      els.annotationLayer.querySelectorAll("[data-annotation-id]").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          openAnnotationCard(button.dataset.annotationId);
        });
      });
    }

    function renderAnnotationMarkers() {
      if (annotationState.routeLayer) annotationState.routeLayer.clearLayers();
      if (annotationState.placesLayer) annotationState.placesLayer.clearLayers();
      annotationState.routeMarkers.forEach(marker => marker.remove());
      annotationState.placesMarkers.forEach(marker => marker.remove());
      annotationState.routeMarkers = [];
      annotationState.placesMarkers = [];

      if (state.mapReady && annotationState.routeLayer) {
        visibleMapAnnotations("route").forEach(item => {
          const marker = L.marker([item.lat, item.lng], {
            icon: annotationIcon(item, annotationState.activeId === item.id),
            title: item.text,
            pane: "routeAnnotationPane",
            zIndexOffset: 300
          }).addTo(annotationState.routeLayer);
          marker.on("click", event => {
            if (event.originalEvent) L.DomEvent.stop(event.originalEvent);
            openAnnotationCard(item.id);
          });
          annotationState.routeMarkers.push(marker);
        });
      }

      if (placesState.mapReady && annotationState.placesLayer) {
        visibleMapAnnotations("places").forEach(item => {
          const marker = L.marker([item.lat, item.lng], {
            icon: annotationIcon(item, annotationState.activeId === item.id),
            title: item.text,
            pane: "placesAnnotationPane",
            zIndexOffset: 300
          }).addTo(annotationState.placesLayer);
          marker.on("click", event => {
            if (event.originalEvent) L.DomEvent.stop(event.originalEvent);
            openAnnotationCard(item.id);
          });
          annotationState.placesMarkers.push(marker);
        });
      }
    }

    function renderAnnotationCard() {
      const item = annotationState.items.find(annotation => annotation.id === annotationState.activeId);
      if (!item) {
        els.annotationCard.hidden = true;
        return;
      }

      const editable = canEditAnnotation(item);
      const colorOptions = COMMENT_COLORS.map(color => `
        <label title="气泡颜色">
          <input type="radio" name="annotationColor" value="${color}" ${color === item.color ? "checked" : ""} ${editable ? "" : "disabled"}>
          <span class="color-dot" style="--comment-color:${color}"></span>
        </label>
      `).join("");

      els.annotationCard.hidden = false;
      els.annotationCard.innerHTML = `
        <div class="annotation-card-band" style="--comment-color:${item.color}"></div>
        <div class="annotation-card-body">
          <div class="annotation-card-head">
            <strong>${item.target === "map" ? "地图气泡" : "UI 气泡"}</strong>
            <span>${escapeHtml(item.name)} · ${formatCommentTime(item.createdAt)}</span>
          </div>
          <form id="annotationForm" class="annotation-form">
            <input id="annotationName" class="comment-input" type="text" maxlength="18" value="${escapeHtml(item.name)}" ${editable ? "" : "disabled"}>
            <div class="color-options">${colorOptions}</div>
            <textarea id="annotationText" class="comment-text" maxlength="120" ${editable ? "" : "disabled"}>${escapeHtml(item.text)}</textarea>
            <div class="annotation-actions">
              ${editable ? `<button class="primary" type="submit">保存修改</button><button class="danger" type="button" id="annotationDeleteBtn">删除</button>` : ""}
              <button type="button" id="annotationCloseBtn">关闭</button>
            </div>
          </form>
        </div>
      `;

      const form = document.getElementById("annotationForm");
      if (form && editable) form.addEventListener("submit", saveAnnotationEdit);
      const deleteBtn = document.getElementById("annotationDeleteBtn");
      if (deleteBtn) deleteBtn.addEventListener("click", deleteActiveAnnotation);
      const closeBtn = document.getElementById("annotationCloseBtn");
      if (closeBtn) {
        closeBtn.addEventListener("click", () => {
          annotationState.activeId = "";
          renderAnnotations();
        });
      }
    }

    function renderAnnotations() {
      renderAnnotationControls();
      renderUiAnnotations();
      renderAnnotationMarkers();
      renderAnnotationCard();
    }

    function openAnnotationCard(id) {
      annotationState.activeId = id;
      renderAnnotations();
    }

    function setAnnotationMode(mode) {
      annotationState.enabled = true;
      annotationState.mode = mode;
      annotationState.activeId = "";
      renderAnnotations();
    }

    function toggleAnnotationMode() {
      annotationState.enabled = !annotationState.enabled;
      annotationState.activeId = "";
      renderAnnotations();
    }

    function closeAnnotationMode() {
      annotationState.enabled = false;
      renderAnnotations();
    }

    function requestAnnotationDraft() {
      return {
        name: state.visitor.name || "未署名",
        text: "新气泡",
        color: COMMENT_COLORS[0]
      };
    }

    function createAnnotation(fields) {
      const draft = requestAnnotationDraft();
      if (!draft) return;

      const item = {
        id: `${state.visitor.id}-annotation-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        visitorId: state.visitor.id,
        createdAt: new Date().toISOString(),
        updatedAt: "",
        ...draft,
        ...fields
      };

      annotationState.items = [...annotationState.items, item];
      annotationState.activeId = item.id;
      saveAnnotations();
      renderAnnotations();
      syncAnnotationChange("addAnnotation", item).catch(() => renderAnnotations());
    }

    function createUiAnnotation(event) {
      if (!annotationState.enabled || annotationState.mode !== "ui") return;
      if (event.target.closest(".annotation-toolbar, .annotation-card, .annotation-pin")) return;

      const x = Math.max(0, Math.min(100, (event.clientX / window.innerWidth) * 100));
      const y = Math.max(0, Math.min(100, (event.clientY / window.innerHeight) * 100));
      createAnnotation({
        target: "ui",
        page: state.page,
        mapId: state.page === "map" ? "places" : "route",
        x: Number(x.toFixed(3)),
        y: Number(y.toFixed(3)),
        lat: "",
        lng: ""
      });
    }

    function createMapAnnotation(latlng, mapId) {
      if (!annotationState.enabled || annotationState.mode !== "map") return;
      createAnnotation({
        target: "map",
        page: mapId === "places" ? "map" : "route",
        mapId,
        x: "",
        y: "",
        lat: Number(latlng.lat.toFixed(6)),
        lng: Number(latlng.lng.toFixed(6))
      });
    }

    function createMapAnnotationFromMapEvent(event, mapInstance, mapId) {
      if (!annotationState.enabled || annotationState.mode !== "map") return;
      if (event.target.closest(".leaflet-control, .leaflet-marker-icon, .annotation-marker")) return;
      createMapAnnotation(mapInstance.mouseEventToLatLng(event), mapId);
    }

    async function saveAnnotationEdit(event) {
      event.preventDefault();
      const item = annotationState.items.find(annotation => annotation.id === annotationState.activeId);
      if (!item || !canEditAnnotation(item)) return;

      const nameInput = document.getElementById("annotationName");
      const textInput = document.getElementById("annotationText");
      const colorInput = document.querySelector('input[name="annotationColor"]:checked');
      if (nameInput.value.trim()) setVisitorName(nameInput.value.trim());

      const updated = {
        ...item,
        name: nameInput.value.trim() || item.name,
        text: textInput.value.trim() || "已标记",
        color: colorInput ? colorInput.value : item.color,
        updatedAt: new Date().toISOString()
      };

      annotationState.items = annotationState.items.map(annotation => annotation.id === updated.id ? updated : annotation);
      saveAnnotations();
      renderAnnotations();
      try {
        await syncAnnotationChange("updateAnnotation", updated);
      } catch (error) {
        renderAnnotations();
      }
    }

    async function deleteActiveAnnotation() {
      const item = annotationState.items.find(annotation => annotation.id === annotationState.activeId);
      if (!item || !canEditAnnotation(item)) return;
      const ok = window.confirm("删除这个气泡和它的备注？");
      if (!ok) return;

      try {
        await syncAnnotationChange("deleteAnnotation", item);
      } catch (error) {
        // Keep local deletion available even when the annotation backend has not been deployed yet.
      }

      annotationState.items = annotationState.items.filter(annotation => annotation.id !== item.id);
      annotationState.activeId = "";
      saveAnnotations();
      renderAnnotations();
    }

    function renderPlacesFilters() {
      const filters = [
        `<button class="places-filter-btn${placesState.activeDay === "all" ? " active" : ""}" type="button" data-place-day="all">全部</button>`,
        ...ROUTE_DAYS.map((routeDay, index) => {
          const active = placesState.activeDay === String(index);
          return `<button class="places-filter-btn${active ? " active" : ""}" style="--day-color:${routeDay.color}" type="button" data-place-day="${index}">${routeDay.day}</button>`;
        })
      ];

      placesEls.filter.innerHTML = filters.join("");
      placesEls.filter.querySelectorAll("[data-place-day]").forEach(button => {
        button.addEventListener("click", () => {
          placesState.activeDay = button.dataset.placeDay;
          placesState.activeKey = "";
          renderPlaces();
        });
      });
    }

    function renderPlacesList() {
      const stops = visiblePlaces();
      placesEls.count.textContent = `${stops.length} 个地点`;
      placesEls.list.innerHTML = stops.map(item => `
        <button class="places-item${placesState.activeKey === item.key ? " active" : ""}" type="button" data-place-key="${item.key}">
          <span class="places-index" style="--day-color:${item.routeDay.color}">${item.stopIndex + 1}</span>
          <span>
            <span class="places-name">${escapeHtml(item.name)}</span>
            <span class="places-sub">${item.routeDay.day} · ${item.time} · ${escapeHtml(item.place)}</span>
          </span>
        </button>
      `).join("");

      placesEls.list.querySelectorAll("[data-place-key]").forEach(button => {
        button.addEventListener("click", () => selectPlace(button.dataset.placeKey));
      });

      const active = placesEls.list.querySelector(".places-item.active");
      if (active) active.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }

    function renderPlacesCard() {
      const item = currentPlace();
      if (!item) {
        placesEls.card.hidden = true;
        placesEls.chip.textContent = placesState.activeDay === "all" ? "显示全部候选地点，点击左侧地点或地图 pin 查看详情。" : "显示当前天数地点，点击地点或 pin 查看详情。";
        return;
      }

      placesEls.chip.textContent = `${item.routeDay.day} · ${item.name}`;
      placesEls.card.hidden = false;
      placesEls.card.innerHTML = `
        <div class="places-card-band" style="--day-color:${item.routeDay.color}"></div>
        <div class="places-card-body">
          <h2>${escapeHtml(item.name)}</h2>
          <div class="places-meta">
            <span>${item.routeDay.day}</span>
            <span>${item.time}</span>
            <span>${item.drive}</span>
            <span>${item.stay}</span>
          </div>
          <p>${escapeHtml(item.desc)}</p>
          <div class="places-actions">
            <a href="${googleMapsUrl(item)}" target="_blank" rel="noopener noreferrer">Google Maps</a>
            <button type="button" data-route-target="${item.dayIndex}-${item.stopIndex}">路线里查看</button>
            <button type="button" data-close-place>关闭</button>
          </div>
        </div>
      `;

      const routeButton = placesEls.card.querySelector("[data-route-target]");
      if (routeButton) {
        routeButton.addEventListener("click", () => {
          const [dayIndex, stopIndex] = routeButton.dataset.routeTarget.split("-").map(Number);
          state.dayIndex = dayIndex;
          state.stopIndex = stopIndex;
          location.hash = "route";
          showPage("route");
        });
      }

      const closeButton = placesEls.card.querySelector("[data-close-place]");
      if (closeButton) {
        closeButton.addEventListener("click", () => {
          placesState.activeKey = "";
          renderPlaces();
        });
      }
    }

    function renderPlaces() {
      renderPlacesFilters();
      renderPlacesList();
      renderPlacesCard();
      drawPlacesMap();
    }

    function selectPlace(key) {
      const item = allStops().find(stopItem => stopItem.key === key);
      if (!item) return;
      placesState.activeKey = key;
      renderPlaces();
    }

    function render() {
      renderVisitor();
      renderDayTabs();
      renderSummary();
      renderStopList();
      renderDetail();
      renderTimeline();
      drawMap();
      renderAnnotations();
    }

    function showPage(page) {
      state.page = page;
      const isMapPage = page === "map";
      els.routeApp.hidden = isMapPage;
      els.placesApp.hidden = !isMapPage;

      if (isMapPage) {
        pause(false);
        initPlacesMap();
        renderPlaces();
        renderAnnotations();
        if (placesState.mapReady) {
          window.setTimeout(() => placesState.map.invalidateSize(), 50);
        }
        return;
      }

      initMap();
      render();
      renderAnnotations();
      if (state.mapReady) {
        window.setTimeout(() => state.map.invalidateSize(), 50);
      }
    }

    function syncPageFromHash() {
      showPage(pageFromHash());
    }

    async function addComment(event) {
      event.preventDefault();
      const nameInput = document.getElementById("commentName");
      const textInput = document.getElementById("commentText");
      const colorInput = document.querySelector('input[name="commentColor"]:checked');
      const typedName = nameInput.value.trim();
      if (typedName) {
        setVisitorName(typedName);
      }
      const name = state.visitor.name || "未署名";
      const text = textInput.value.trim() || "已标记";
      const key = stopKey();
      const currentDay = day();
      const currentStop = state.stopIndex;
      const currentItem = stop();

      if (state.editingCommentId) {
        await saveEditedComment({
          key,
          id: state.editingCommentId,
          name,
          text,
          color: colorInput ? colorInput.value : COMMENT_COLORS[0]
        });
        return;
      }

      const nextComment = {
        id: `${state.visitor.id}-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        visitorId: state.visitor.id,
        name,
        text,
        color: colorInput ? colorInput.value : COMMENT_COLORS[0],
        createdAt: new Date().toISOString()
      };

      state.comments[key] = [...commentsFor(), nextComment];
      saveComments();
      render();
      syncComment(key, nextComment, currentDay, currentStop, currentItem);
    }

    async function saveEditedComment({ key, id, name, text, color }) {
      const comment = findCurrentComment(id);
      if (!comment) return;

      const updatedComment = {
        ...comment,
        name,
        text,
        color,
        updatedAt: new Date().toISOString()
      };

      updateLocalComment(key, id, () => updatedComment);
      state.editingCommentId = null;
      saveComments();
      render();

      try {
        await syncCommentChange("update", { routeKey: key, comment: updatedComment });
      } catch (error) {
        state.syncStatus = "修改已保存在本机，远端同步失败";
        renderDetail();
      }
    }

    function findCurrentComment(commentId) {
      return commentsFor().find(comment => comment.id === commentId && canEditComment(comment));
    }

    function editComment(commentId) {
      const comment = findCurrentComment(commentId);
      if (!comment) return;
      state.editingCommentId = commentId;
      renderDetail();
    }

    async function deleteComment(commentId) {
      const key = stopKey();
      const comment = findCurrentComment(commentId);
      if (!comment) return;
      const ok = window.confirm("删除这条标记记录？");
      if (!ok) return;

      try {
        if (syncEnabled()) {
          state.syncStatus = "正在删除远端记录";
          renderDetail();
          await syncCommentChange("delete", { routeKey: key, comment });
        }
        removeLocalComment(key, commentId);
        state.editingCommentId = null;
        render();
      } catch (error) {
        if (error.message === "remote_comment_not_found") {
          removeLocalComment(key, commentId);
          state.editingCommentId = null;
          state.syncStatus = "远端未找到，本机已删除";
          render();
          return;
        }
        state.syncStatus = "删除失败：远端记录未删除";
        renderDetail();
      }
    }

    function goNext() {
      const lastStop = day().stops.length - 1;
      if (state.stopIndex < lastStop) {
        state.stopIndex += 1;
      } else if (state.dayIndex < ROUTE_DAYS.length - 1) {
        state.dayIndex += 1;
        state.stopIndex = 0;
      } else {
        pause();
        return;
      }
      render();
    }

    function goPrev() {
      if (state.stopIndex > 0) {
        state.stopIndex -= 1;
      } else if (state.dayIndex > 0) {
        state.dayIndex -= 1;
        state.stopIndex = ROUTE_DAYS[state.dayIndex].stops.length - 1;
      }
      render();
    }

    function play() {
      pause(false);
      state.playing = true;
      renderTimeline();
      state.timer = window.setInterval(goNext, Number(els.speedSelect.value));
    }

    function pause(update = true) {
      state.playing = false;
      if (state.timer) {
        window.clearInterval(state.timer);
        state.timer = null;
      }
      if (update) renderTimeline();
    }

    els.playBtn.addEventListener("click", () => {
      if (state.playing) {
        pause();
      } else {
        play();
      }
    });

    els.prevBtn.addEventListener("click", () => {
      pause();
      goPrev();
    });

    els.nextBtn.addEventListener("click", () => {
      pause();
      goNext();
    });

    els.resetBtn.addEventListener("click", () => {
      pause();
      state.dayIndex = 0;
      state.stopIndex = 0;
      render();
    });

    els.scrubber.addEventListener("input", event => {
      pause();
      state.stopIndex = Number(event.target.value);
      render();
    });

    els.speedSelect.addEventListener("change", () => {
      if (state.playing) play();
    });

    els.visitorBtn.addEventListener("click", () => {
      const nextName = window.prompt("输入这台浏览器要记住的名字", state.visitor.name || "");
      if (nextName !== null) {
        setVisitorName(nextName);
        renderDetail();
      }
    });

    els.pinToggleBtn.addEventListener("click", toggleAnnotationMode);
    placesEls.pinToggleBtn.addEventListener("click", toggleAnnotationMode);
    els.pinUiModeBtn.addEventListener("click", () => setAnnotationMode("ui"));
    els.pinMapModeBtn.addEventListener("click", () => setAnnotationMode("map"));
    els.pinCloseBtn.addEventListener("click", closeAnnotationMode);
    els.annotationLayer.addEventListener("click", createUiAnnotation);

    window.addEventListener("keydown", event => {
      const tagName = event.target && event.target.tagName ? event.target.tagName.toLowerCase() : "";
      if (tagName === "input" || tagName === "textarea" || tagName === "select") return;
      if (event.key.toLowerCase() === "p") {
        event.preventDefault();
        toggleAnnotationMode();
      }
    });

    window.addEventListener("hashchange", syncPageFromHash);

    window.addEventListener("resize", () => {
      if (state.mapReady) {
        state.map.invalidateSize();
      }
      if (placesState.mapReady) {
        placesState.map.invalidateSize();
      }
    });

    showPage(state.page);
    refreshSyncedComments();
    refreshSyncedAnnotations();
    if (syncEnabled()) {
      window.setInterval(refreshSyncedComments, SYNC_REFRESH_MS);
      window.setInterval(refreshSyncedAnnotations, SYNC_REFRESH_MS);
    }
  </script>
</body>
</html>
