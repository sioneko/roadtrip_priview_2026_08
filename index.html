<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鸟取・岛根・山口自驾路线广度预览</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://tile.openstreetmap.org">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: light;
      --ink: #17212b;
      --muted: #66737f;
      --line: #d8e0e7;
      --panel: rgba(255, 255, 255, 0.94);
      --panel-strong: #ffffff;
      --shadow: 0 18px 60px rgba(24, 38, 52, 0.16);
      --blue: #2563eb;
      --blue-soft: #e8f0ff;
      --green: #0f8b70;
      --orange: #d8692a;
      --plum: #8a3ffc;
      --sea: #1f9bb4;
      --sand: #f2c66d;
      --road: #293241;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: Inter, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background: #eaf0f5;
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 640px;
      background: #dfeaf0;
    }

    #map {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(110deg, rgba(248, 224, 163, 0.6), rgba(137, 197, 204, 0.35)),
        #dce9ee;
      z-index: 0;
    }

    #map::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0.12) 34%, rgba(255, 255, 255, 0.2) 100%),
        radial-gradient(circle at 78% 18%, rgba(255, 255, 255, 0.55), transparent 24%);
      z-index: 401;
    }

    .map-fallback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      color: #22313c;
      background:
        linear-gradient(135deg, rgba(242, 198, 109, 0.55), rgba(31, 155, 180, 0.38)),
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.2) 0 1px, transparent 1px 18px);
      z-index: 1;
    }

    .map-fallback[hidden] {
      display: none;
    }

    .fallback-inner {
      width: min(620px, 92vw);
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .shell {
      position: relative;
      z-index: 5;
      display: grid;
      grid-template-columns: minmax(300px, 360px) minmax(0, 1fr) minmax(300px, 360px);
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 14px;
      height: 100%;
      padding: 16px;
      pointer-events: none;
    }

    .topbar,
    .side-panel,
    .detail-panel,
    .player,
    .places-panel,
    .places-card {
      pointer-events: auto;
      border: 1px solid rgba(216, 224, 231, 0.88);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .topbar {
      grid-column: 1 / 4;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      border-radius: var(--radius);
    }

    .title-block {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--green);
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .route-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #33414d;
      background: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      white-space: nowrap;
    }

    .view-pill.active {
      color: #0b3f6f;
      border-color: rgba(37, 99, 235, 0.28);
      background: var(--blue-soft);
      font-weight: 800;
    }

    button.meta-pill {
      justify-content: center;
    }

    a.meta-pill {
      text-decoration: none;
    }

    .visitor-pill {
      color: #0b3f6f;
      background: var(--blue-soft);
      border-color: rgba(37, 99, 235, 0.24);
      font-weight: 800;
    }

    .side-panel {
      grid-column: 1;
      grid-row: 2;
      align-self: stretch;
      min-height: 0;
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .day-tabs {
      display: flex;
      overflow-x: auto;
      border-bottom: 1px solid var(--line);
      background: rgba(248, 251, 253, 0.9);
      scrollbar-width: thin;
    }

    .day-tab {
      flex: 0 0 112px;
      min-height: 54px;
      padding: 8px 6px;
      color: #485560;
      background: transparent;
      border-right: 1px solid var(--line);
      text-align: center;
    }

    .day-tab:last-child {
      border-right: 0;
    }

    .day-tab strong {
      display: block;
      font-size: 13px;
      line-height: 1.2;
    }

    .day-tab span {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .day-tab.active {
      color: #0b3f6f;
      background: var(--blue-soft);
      box-shadow: inset 0 -3px 0 var(--blue);
    }

    .day-summary {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
    }

    .day-summary h2 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .day-summary p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .day-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .stat {
      min-width: 0;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .stat strong {
      display: block;
      margin-top: 3px;
      font-size: 14px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .stop-list {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .stop-item {
      width: 100%;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 10px;
      padding: 10px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: inherit;
      background: transparent;
      text-align: left;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .stop-item + .stop-item {
      margin-top: 6px;
    }

    .stop-item:hover,
    .stop-item.active {
      border-color: rgba(37, 99, 235, 0.28);
      background: rgba(232, 240, 255, 0.88);
      transform: translateY(-1px);
    }

    .stop-index {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: #fff;
      background: var(--road);
      font-size: 14px;
      font-weight: 800;
    }

    .stop-main {
      min-width: 0;
    }

    .stop-topline {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .stop-time {
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .stop-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 800;
    }

    .map-link {
      color: inherit;
      text-decoration: none;
    }

    .map-link:hover {
      text-decoration: underline;
    }

    .stop-sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .map-chip {
      position: absolute;
      left: 50%;
      top: 96px;
      z-index: 6;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      max-width: min(540px, calc(100vw - 760px));
      min-height: 40px;
      padding: 8px 12px;
      border: 1px solid rgba(216, 224, 231, 0.88);
      border-radius: 999px;
      color: #26333e;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 12px 36px rgba(24, 38, 52, 0.14);
      pointer-events: auto;
      backdrop-filter: blur(18px);
    }

    .map-chip strong,
    .map-chip span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .map-chip strong {
      font-size: 13px;
    }

    .map-chip span {
      color: var(--muted);
      font-size: 12px;
    }

    .detail-panel {
      grid-column: 3;
      grid-row: 2;
      align-self: end;
      border-radius: var(--radius);
      overflow: hidden;
    }

    .photo-strip {
      position: relative;
      min-height: 168px;
      background:
        linear-gradient(135deg, rgba(23, 33, 43, 0.08), transparent),
        linear-gradient(120deg, var(--sand), var(--sea));
      overflow: hidden;
    }

    .photo-strip::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, transparent 42%, rgba(0, 0, 0, 0.48)),
        var(--photo, linear-gradient(120deg, var(--sand), var(--sea)));
      background-size: cover;
      background-position: center;
      filter: saturate(1.02);
      transform: scale(1.01);
    }

    .photo-label {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 12px;
      z-index: 1;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      color: #fff;
    }

    .photo-label strong {
      display: block;
      font-size: 22px;
      line-height: 1.15;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.32);
    }

    .photo-label .map-link {
      color: #fff;
    }

    .photo-label span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.22);
      font-size: 12px;
      white-space: nowrap;
      backdrop-filter: blur(10px);
    }

    .detail-body {
      padding: 16px;
      background: var(--panel-strong);
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .detail-meta span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 8px;
      border-radius: 999px;
      background: #f1f5f7;
      color: #485560;
      font-size: 12px;
    }

    .detail-body p {
      margin: 0;
      color: #34414d;
      font-size: 14px;
      line-height: 1.65;
    }

    .note {
      margin-top: 14px;
      padding: 10px 11px;
      border-left: 3px solid var(--orange);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: #5b3d24;
      background: #fff4e7;
      font-size: 13px;
      line-height: 1.5;
    }

    .comment-panel {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .comment-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .comment-head strong {
      font-size: 13px;
    }

    .comment-count {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .sync-status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 8px;
      border-radius: 999px;
      color: #485560;
      background: #eef3f7;
      font-size: 12px;
      white-space: nowrap;
    }

    .sync-status.online {
      color: #0f6b57;
      background: #e6f7f1;
    }

    .comment-form {
      display: grid;
      gap: 8px;
    }

    .comment-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .comment-input,
    .comment-text {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: #fff;
      outline: 0;
    }

    .comment-input {
      height: 36px;
      padding: 0 10px;
    }

    .comment-text {
      min-height: 58px;
      resize: vertical;
      padding: 9px 10px;
      line-height: 1.45;
    }

    .comment-input:focus,
    .comment-text:focus {
      border-color: rgba(37, 99, 235, 0.52);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .color-options {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .color-options input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .color-dot {
      width: 24px;
      height: 24px;
      display: block;
      border: 2px solid #fff;
      border-radius: 999px;
      background: var(--comment-color);
      box-shadow: 0 0 0 1px rgba(23, 33, 43, 0.16);
      cursor: pointer;
    }

    .color-options input:checked + .color-dot {
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.22), 0 0 0 1px rgba(23, 33, 43, 0.18);
      transform: scale(1.08);
    }

    .comment-submit {
      height: 36px;
      border-radius: var(--radius);
      color: #fff;
      background: var(--blue);
      font-size: 13px;
      font-weight: 800;
    }

    .comment-cancel {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #34414d;
      background: #fff;
      font-size: 13px;
      font-weight: 800;
    }

    .comment-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .comment-item {
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--comment-color);
      border-radius: var(--radius);
      background: #f8fbfd;
    }

    .comment-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .comment-meta strong {
      color: #26333e;
      font-size: 12px;
    }

    .comment-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .comment-action {
      min-height: 28px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #34414d;
      background: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .comment-action.danger {
      color: #9f1239;
      border-color: rgba(159, 18, 57, 0.24);
      background: #fff1f2;
    }

    .comment-item p {
      margin: 0;
      color: #34414d;
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .comment-empty {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .player {
      grid-column: 1 / 4;
      grid-row: 3;
      display: grid;
      grid-template-columns: auto minmax(180px, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 12px;
      border-radius: var(--radius);
    }

    .places-panel {
      grid-column: 1;
      grid-row: 2 / 4;
      align-self: stretch;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-radius: var(--radius);
    }

    .places-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .places-head h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .places-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .places-filter {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      scrollbar-width: thin;
    }

    .place-filter {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #40505d;
      background: #fff;
      font-size: 12px;
      font-weight: 800;
    }

    .place-filter.active {
      color: #fff;
      border-color: var(--day-color, var(--blue));
      background: var(--day-color, var(--blue));
    }

    .places-list {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .place-item {
      width: 100%;
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
      padding: 9px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: inherit;
      background: transparent;
      text-align: left;
    }

    .place-item + .place-item {
      margin-top: 5px;
    }

    .place-item:hover,
    .place-item.active {
      border-color: rgba(37, 99, 235, 0.26);
      background: rgba(232, 240, 255, 0.92);
    }

    .place-index {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: #fff;
      background: var(--day-color, var(--road));
      font-size: 12px;
      font-weight: 900;
    }

    .place-name {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 850;
    }

    .place-sub {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .places-card {
      grid-column: 3;
      grid-row: 2;
      align-self: end;
      justify-self: stretch;
      overflow: hidden;
      border-radius: var(--radius);
    }

    .places-card[hidden] {
      display: none;
    }

    .places-band {
      min-height: 8px;
      background: var(--day-color, var(--blue));
    }

    .places-card-body {
      padding: 14px;
    }

    .places-card-body h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .places-card-body p {
      margin: 10px 0;
      color: #33414d;
      font-size: 14px;
      line-height: 1.55;
    }

    .places-meta,
    .places-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .places-meta span,
    .places-actions a,
    .places-actions button {
      min-height: 30px;
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #354551;
      background: #fff;
      font-size: 12px;
      font-weight: 750;
      text-decoration: none;
    }

    .places-actions a {
      color: #0b3f6f;
      border-color: rgba(37, 99, 235, 0.28);
      background: var(--blue-soft);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #22313c;
      background: #fff;
      font-size: 18px;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .icon-btn:hover {
      border-color: rgba(37, 99, 235, 0.4);
      background: var(--blue-soft);
      transform: translateY(-1px);
    }

    .icon-btn.primary {
      width: 48px;
      color: #fff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .timeline-wrap {
      min-width: 0;
    }

    .timeline-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .timeline-head strong,
    .timeline-head span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .timeline-head span {
      color: var(--muted);
    }

    .scrubber {
      width: 100%;
      accent-color: var(--blue);
    }

    .mini-stops {
      display: grid;
      grid-template-columns: repeat(var(--count), minmax(18px, 1fr));
      gap: 4px;
      margin-top: 7px;
    }

    .mini-stop {
      height: 5px;

      transition: background 160ms ease, transform 160ms ease;

    .mini-stop.done {

    .player-tools {
      display: flex;

      gap: 10px;

    .select {

    .custom-marker {

      border-radius: 999px;

    }

    .moving-marker {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 3px solid #fff;
      border-radius: 999px;
      color: #fff;

      box-shadow: 0 12px 32px rgba(37, 99, 235, 0.36);

      font-weight: 900;
    }

    @media (max-width: 1180px) {
      .shell {
        grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
      }

      .topbar,
      .player {
        grid-column: 1 / 3;

      .detail-panel {

    @media (max-width: 860px) {
      html,
      body {
        overflow: auto;
        background: #edf3f7;
      }

      .app {
        display: flex;
        flex-direction: column;
        min-height: 100dvh;

      #map {

        flex: 0 0 auto;

      .map-fallback {
        position: absolute;
        inset: auto;
        top: 0;

      .shell {
        display: flex;

      .topbar {

      }

      h1 {

      .route-meta {
        justify-content: flex-start;

      .meta-pill {

      .map-chip {
        position: relative;

        min-height: 34px;
        margin: 8px 10px 0;
        padding: 7px 10px;
        border-radius: var(--radius);
      }

      .side-panel {
        max-height: none;
      }

      .places-panel {
        max-height: none;
      }

      .day-tab {
        flex-basis: 96px;
        min-height: 46px;
      }

      .day-summary {
        padding: 12px;
      }

      .day-summary h2 {
        font-size: 16px;
      }

      .day-summary p {
        font-size: 12px;
      }

      .day-stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .stat {
        padding: 7px;
      }

      .stop-list {
        max-height: 42dvh;
        padding: 8px;
      }

      .places-list {
        max-height: 42dvh;

      .stop-item {

      .place-item {

      }

      .stop-index {

      .detail-panel {

      .player {

        left: 10px;

        grid-template-columns: 1fr;

      .controls,

    @media (max-width: 560px) {

      }

<body>
  <main class="app">
    <div id="map"></div>
    <div id="mapFallback" class="map-fallback" hidden>
      <div class="fallback-inner">
        <strong>地图资源暂时没有加载出来</strong>

    </div>

    <div id="mapChip" class="map-chip" aria-live="polite"></div>

          <h1>鸟取・岛根・山口自驾游广度版</h1>
        </div>
        <div class="route-meta">
          <span class="meta-pill">7 天候选</span>
          <span class="meta-pill">约 900 km+</span>
          <span class="meta-pill">鸟取进 / 下关或山口出</span>
          <a id="routeViewLink" class="meta-pill view-pill active" href="#route">路线预览</a>

        </header>
        <nav id="placesFilter" class="places-filter" aria-label="按天筛选地点"></nav>
        <div id="placesList" class="places-list"></div>
      </aside>

      <article id="placesCard" class="places-card" aria-live="polite" hidden></article>

      <footer id="routePlayer" class="player">
        <div class="controls" aria-label="路线播放控制">
          <button id="prevBtn" class="icon-btn" type="button" title="上一个停靠点" aria-label="上一个停靠点">‹</button>
          <button id="playBtn" class="icon-btn primary" type="button" title="播放路线" aria-label="播放路线">▶</button>
          <button id="nextBtn" class="icon-btn" type="button" title="下一个停靠点" aria-label="下一个停靠点">›</button>

        <div class="player-tools">

          </select>
        </div>
      </footer>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./trip-data.js"></script>
  <script>
    const { routeDays: ROUTE_DAYS, photoGradients: PHOTO_GRADIENTS } = window.TRIP_DATA;
    const COMMENT_KEY = "sanin-yamaguchi-roadtrip-comments-v1";
    const VISITOR_KEY = "sanin-yamaguchi-roadtrip-visitor-v1";
    const SYNC_ENDPOINT = "https://script.google.com/macros/s/AKfycbzFipxrcrVtDg1XMtVA0Cs0oARuNnMlteLeShhlTZtcPzPzea_QA9Wp5-fgjbT7PSd-hg/exec";
    const SYNC_REFRESH_MS = 45000;
    const COMMENT_COLORS = ["#22c55e", "#f59e0b", "#ef4444", "#3b82f6", "#8b5cf6"];
    const initialRouteTarget = routeTargetFromHash();

    const initialVisitor = loadVisitor();

    const state = {
      view: location.hash === "#places" ? "places" : "route",
      dayIndex: initialRouteTarget ? initialRouteTarget.dayIndex : 0,
      stopIndex: initialRouteTarget ? initialRouteTarget.stopIndex : 0,
      placeDay: "all",
      placeKey: "",
      playing: false,
      timer: null,
      mapReady: false,
      map: null,
      routeLines: [],
      progressLine: null,
      markers: [],
      movingMarker: null,
      comments: loadComments(initialVisitor),
      visitor: initialVisitor,
      syncStatus: "",
      editingCommentId: null
    };

    const els = {
      routePanel: document.getElementById("routePanel"),
      routePlayer: document.getElementById("routePlayer"),
      routeViewLink: document.getElementById("routeViewLink"),
      placesViewLink: document.getElementById("placesViewLink"),
      dayTabs: document.getElementById("dayTabs"),
      daySummary: document.getElementById("daySummary"),
      stopList: document.getElementById("stopList"),
      detailPanel: document.getElementById("detailPanel"),
      placesPanel: document.getElementById("placesPanel"),
      placesIntro: document.getElementById("placesIntro"),
      placesFilter: document.getElementById("placesFilter"),
      placesList: document.getElementById("placesList"),
      placesCard: document.getElementById("placesCard"),
      timelineHead: document.getElementById("timelineHead"),
      scrubber: document.getElementById("scrubber"),
      miniStops: document.getElementById("miniStops"),
      playBtn: document.getElementById("playBtn"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      resetBtn: document.getElementById("resetBtn"),
      speedSelect: document.getElementById("speedSelect"),
      mapChip: document.getElementById("mapChip"),
      mapFallback: document.getElementById("mapFallback"),
      visitorBtn: document.getElementById("visitorBtn")
    };

    function routeTargetFromHash() {
      const match = location.hash.match(/^#route-(\d+)-(\d+)$/);
      if (!match) return null;
      const dayIndex = Number(match[1]);
      const stopIndex = Number(match[2]);
      if (!ROUTE_DAYS[dayIndex] || !ROUTE_DAYS[dayIndex].stops[stopIndex]) return null;
      return { dayIndex, stopIndex };
    }

    function initMap() {
      if (!window.L) {
        els.mapFallback.hidden = false;
        return;
      }

      state.map = L.map("map", {
        zoomControl: false,
        scrollWheelZoom: true
      }).setView([35.37, 133.35], 9);

      L.control.zoom({ position: "bottomright" }).addTo(state.map);

      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 18,
        attribution: "&copy; OpenStreetMap"
      }).addTo(state.map);

      state.mapReady = true;
      drawMap();
    }

    function day() {
      return ROUTE_DAYS[state.dayIndex];
    }

    function stop() {
      return day().stops[state.stopIndex];
    }

    function stopKey(dayIndex = state.dayIndex, stopIndex = state.stopIndex) {
      return `${ROUTE_DAYS[dayIndex].day}-${stopIndex}`;
    }

    function allStops() {
      return ROUTE_DAYS.flatMap((routeDay, dayIndex) => {
        return routeDay.stops.map((item, stopIndex) => ({
          ...item,
          key: stopKey(dayIndex, stopIndex),
          routeDay,
          dayIndex,
          stopIndex
        }));
      });
    }

    function visiblePlaces() {
      const stops = allStops();
      if (state.placeDay === "all") return stops;
      return stops.filter(item => item.dayIndex === Number(state.placeDay));
    }

    function currentPlace() {
      return allStops().find(item => item.key === state.placeKey);
    }

    function loadComments(visitor) {
      try {
        return normalizeLocalComments(JSON.parse(localStorage.getItem(COMMENT_KEY)) || {}, visitor);
      } catch (error) {
        return {};
      }
    }

    function hashText(value) {
      let hash = 0;
      for (let index = 0; index < value.length; index += 1) {
        hash = ((hash << 5) - hash) + value.charCodeAt(index);
        hash |= 0;
      }
      return Math.abs(hash).toString(36);
    }

    function normalizeLocalComments(comments, visitor) {
      Object.entries(comments || {}).forEach(([routeKey, items]) => {
        comments[routeKey] = (items || []).map(comment => {
          const stableSeed = `${routeKey}|${comment.createdAt || ""}|${comment.visitorId || ""}|${comment.name || ""}|${comment.color || ""}|${comment.text || ""}`;
          return {
            ...comment,
            id: comment.id || `local-${hashText(stableSeed)}`,
            visitorId: (!comment.visitorId || comment.visitorId === "legacy-local") ? visitor.id : comment.visitorId,
            createdAt: comment.createdAt || new Date().toISOString()
          };
        });
      });
      return comments || {};
    }

    function createVisitorId() {
      if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return `visitor-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function loadVisitor() {
      try {
        const visitor = JSON.parse(localStorage.getItem(VISITOR_KEY)) || {};
        return {
          id: visitor.id || createVisitorId(),
          name: visitor.name || ""
        };
      } catch (error) {
        return {
          id: createVisitorId(),
          name: ""
        };
      }
    }

    function saveVisitor() {
      localStorage.setItem(VISITOR_KEY, JSON.stringify(state.visitor));
      renderVisitor();
    }

    function renderVisitor() {
      if (!els.visitorBtn) return;
      els.visitorBtn.textContent = state.visitor.name ? `访客：${state.visitor.name}` : "访客：设置名字";
      els.visitorBtn.title = state.visitor.name ? "切换访客名字" : "设置访客名字";
    }

    function setVisitorName(name) {
      const nextName = name.trim();
      if (!nextName) return;
      state.visitor = {
        ...state.visitor,
        name: nextName
      };
      saveVisitor();
    }

    function saveComments() {
      localStorage.setItem(COMMENT_KEY, JSON.stringify(state.comments));
    }

    function syncEnabled() {
      return SYNC_ENDPOINT.trim().startsWith("https://script.google.com/");
    }

    function commentIdentity(routeKey, comment) {
      return comment.id || `${routeKey}|${comment.createdAt}|${comment.visitorId || ""}|${comment.name}|${comment.color}|${comment.text}`;
    }

    function mergeCommentMaps(primary, secondary) {
      const merged = {};
      const allKeys = new Set([...Object.keys(primary || {}), ...Object.keys(secondary || {})]);
      allKeys.forEach(key => {
        const seen = new Set();
        merged[key] = [...(primary[key] || []), ...(secondary[key] || [])]
          .filter(comment => {
            const id = commentIdentity(key, comment);
            if (seen.has(id)) return false;
            seen.add(id);
            return true;
          })
          .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      });
      return merged;
    }

    function jsonpRequest(params) {
      return new Promise((resolve, reject) => {
        if (!syncEnabled()) {
          reject(new Error("Sync endpoint is not configured."));
          return;
        }

        const callbackName = `roadtripSync_${Date.now()}_${Math.random().toString(16).slice(2)}`;
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("Google Sheet sync did not respond. Check Apps Script access settings."));
        }, 12000);
        const url = new URL(SYNC_ENDPOINT);
        url.searchParams.set("callback", callbackName);
        Object.entries(params).forEach(([key, value]) => {
          url.searchParams.set(key, typeof value === "string" ? value : JSON.stringify(value));
        });

        const cleanup = () => {
          window.clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        };

        window[callbackName] = data => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("Google Sheet sync request failed."));
        };

        script.src = url.toString();
        document.body.appendChild(script);
      });
    }

    function normalizeRemoteComments(rows) {
      const grouped = {};
      (rows || []).forEach(row => {
        if (!row.routeKey) return;
        if (!grouped[row.routeKey]) grouped[row.routeKey] = [];
        grouped[row.routeKey].push({
          id: row.id || "",
          visitorId: row.visitorId || "",
          name: row.name || "未署名",
          text: row.text || "已标记",
          color: row.color || COMMENT_COLORS[0],
          createdAt: row.createdAt || new Date().toISOString()
        });
      });
      return grouped;
    }

    function assertSyncResponse(response) {
      if (response && response.ok === false) {
        throw new Error(response.error || "Google Sheet sync returned an error.");
      }
      return response;
    }

    function commentsMissingFromRemote(localComments, remoteComments) {
      const missing = [];
      Object.entries(localComments || {}).forEach(([routeKey, items]) => {
        const remoteIds = new Set((remoteComments[routeKey] || []).map(comment => commentIdentity(routeKey, comment)));
        (items || []).forEach(comment => {
          if (comment.visitorId === state.visitor.id && !remoteIds.has(commentIdentity(routeKey, comment))) {
            missing.push({ routeKey, comment });
          }
        });
      });
      return missing;
    }

    function ownLocalComments(localComments) {
      const own = {};
      Object.entries(localComments || {}).forEach(([routeKey, items]) => {
        const filtered = (items || []).filter(comment => comment.visitorId === state.visitor.id);
        if (filtered.length) own[routeKey] = filtered;
      });
      return own;
    }

    function routeInfoFromKey(routeKey) {
      const match = routeKey.match(/^Day (\d+)-(\d+)$/);
      const dayIndex = match ? Number(match[1]) - 1 : 0;
      const stopIndex = match ? Number(match[2]) : 0;
      const currentDay = ROUTE_DAYS[dayIndex] || ROUTE_DAYS[0];
      const currentStop = currentDay.stops[stopIndex] || currentDay.stops[0];
      return { currentDay, stopIndex, currentStop };
    }

    async function uploadMissingLocalComments(remoteComments) {
      const missing = commentsMissingFromRemote(state.comments, remoteComments);
      if (!missing.length) return;

      state.syncStatus = `正在补传 ${missing.length} 条本机记录`;
      renderDetail();

      for (const item of missing) {
        const info = routeInfoFromKey(item.routeKey);
        assertSyncResponse(await jsonpRequest({
          action: "add",
          id: item.comment.id,
          routeKey: item.routeKey,
          day: info.currentDay.day,
          dayTitle: info.currentDay.title,
          stopIndex: info.stopIndex,
          stopName: info.currentStop.name,
          visitorId: item.comment.visitorId,
          name: item.comment.name,
          color: item.comment.color,
          text: item.comment.text,
          createdAt: item.comment.createdAt
        }));
      }
    }

    async function refreshSyncedComments() {
      if (!syncEnabled()) {
        state.syncStatus = "本机记录";
        return;
      }

      try {
        const response = await jsonpRequest({ action: "list" });
        const remote = normalizeRemoteComments(response.rows);
        await uploadMissingLocalComments(remote);
        state.comments = mergeCommentMaps(remote, ownLocalComments(state.comments));
        saveComments();
        state.syncStatus = "Google Sheet 已同步";
        render();
      } catch (error) {
        state.syncStatus = "同步失败，已保留本机记录";
        renderDetail();
      }
    }

    async function syncComment(routeKey, comment, currentDay, currentStop, item) {
      if (!syncEnabled()) return;

      try {
        assertSyncResponse(await jsonpRequest({
          action: "add",
          id: comment.id,
          routeKey,
          day: currentDay.day,
          dayTitle: currentDay.title,
          stopIndex: currentStop,
          stopName: item.name,
          visitorId: comment.visitorId,
          name: comment.name,
          color: comment.color,
          text: comment.text,
          createdAt: comment.createdAt
        }));
        state.syncStatus = "Google Sheet 已同步";
        window.setTimeout(refreshSyncedComments, 900);
      } catch (error) {
        state.syncStatus = "同步失败，已保留本机记录";
        renderDetail();
      }
    }

    async function syncCommentChange(action, payload) {
      if (!syncEnabled()) return;

      try {
        const response = assertSyncResponse(await jsonpRequest({
          action,
          id: payload.comment.id,
          visitorId: state.visitor.id,
          routeKey: payload.routeKey,
          name: payload.comment.name,
          color: payload.comment.color,
          text: payload.comment.text,
          updatedAt: payload.comment.updatedAt || new Date().toISOString()
        }));
        if (action === "delete" && response.deleted === false) {
          throw new Error("remote_comment_not_found");
        }
        state.syncStatus = "Google Sheet 已同步";
        window.setTimeout(refreshSyncedComments, 900);
      } catch (error) {
        state.syncStatus = "同步失败，已保留本机记录";
        renderDetail();
        throw error;
      }
    }

    function canEditComment(comment) {
      return comment.visitorId === state.visitor.id;
    }

    function commentsFor(dayIndex = state.dayIndex, stopIndex = state.stopIndex) {
      return state.comments[stopKey(dayIndex, stopIndex)] || [];
    }

    function latestComment(dayIndex = state.dayIndex, stopIndex = state.stopIndex) {
      const items = commentsFor(dayIndex, stopIndex);
      return items.length ? items[items.length - 1] : null;
    }

    function colorForStop(dayIndex = state.dayIndex, stopIndex = state.stopIndex) {
      const item = latestComment(dayIndex, stopIndex);
      return item ? item.color : null;
    }

    function updateLocalComment(routeKey, commentId, updater) {
      state.comments[routeKey] = (state.comments[routeKey] || []).map(comment => {
        if (comment.id !== commentId || !canEditComment(comment)) return comment;
        return updater(comment);
      });
      saveComments();
    }

    function removeLocalComment(routeKey, commentId) {
      state.comments[routeKey] = (state.comments[routeKey] || []).filter(comment => {
        return comment.id !== commentId || !canEditComment(comment);
      });
      saveComments();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function googleMapsUrl(item) {
      const query = encodeURIComponent(`${item.place || item.name} ${item.lat},${item.lng}`);
      return `https://www.google.com/maps/search/?api=1&query=${query}`;
    }

    function formatCommentTime(value) {
      return new Intl.DateTimeFormat("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(value));
    }

    function markerIcon(label, active, commentColor) {
      const fill = active ? (commentColor || day().color) : (commentColor || "var(--road)");
      return L.divIcon({
        className: "",
        html: `<div class="custom-marker${active ? " active" : ""}" style="background:${fill}">${label}</div>`,
        iconSize: active ? [40, 40] : [30, 30],
        iconAnchor: active ? [20, 20] : [15, 15]
      });
    }

    function movingIcon() {
      return L.divIcon({
        className: "",
        html: '<div class="moving-marker">›</div>',
        iconSize: [34, 34],
        iconAnchor: [17, 17]
      });
    }

    function clearMapLayers() {
      state.routeLines.forEach(line => line.remove());
      state.markers.forEach(marker => marker.remove());
      if (state.progressLine) state.progressLine.remove();
      if (state.movingMarker) state.movingMarker.remove();

      state.routeLines = [];
      state.markers = [];
      state.progressLine = null;
      state.movingMarker = null;
    }

    function drawMap() {
      if (!state.mapReady) return;
      if (state.view === "places") {
        drawPlacesMap();
        return;
      }
      drawRouteMap();
    }

    function drawRouteMap() {
      clearMapLayers();

      ROUTE_DAYS.forEach((routeDay, index) => {
        const coords = routeDay.stops.map(item => [item.lat, item.lng]);
        const line = L.polyline(coords, {
          color: routeDay.color,
          weight: index === state.dayIndex ? 6 : 3,
          opacity: index === state.dayIndex ? 0.78 : 0.28,
          dashArray: index === state.dayIndex ? null : "6 10"
        }).addTo(state.map);
        state.routeLines.push(line);
      });

      day().stops.forEach((item, index) => {
        const commentColor = colorForStop(state.dayIndex, index);
        const marker = L.marker([item.lat, item.lng], {
          icon: markerIcon(index + 1, index === state.stopIndex, commentColor),
          title: item.name
        }).addTo(state.map);

        marker.on("click", () => {
          pause();
          state.stopIndex = index;
          render();
        });

        state.markers.push(marker);
      });

      const coords = progressCoords();
      state.progressLine = L.polyline(coords, {
        color: day().color,
        weight: 8,
        opacity: 0.92
      }).addTo(state.map);

      const current = stop();
      state.movingMarker = L.marker([current.lat, current.lng], {
        icon: movingIcon(),
        zIndexOffset: 200
      }).addTo(state.map);

      const bounds = L.latLngBounds(day().stops.map(item => [item.lat, item.lng]));
      const isCompact = window.matchMedia("(max-width: 860px)").matches;
      state.map.fitBounds(bounds, {
        paddingTopLeft: isCompact ? [28, 28] : [390, 110],
        paddingBottomRight: isCompact ? [28, 28] : [390, 110],
        animate: true,
        duration: 0.6
      });

      setTimeout(() => {
        state.map.flyTo([current.lat, current.lng], isCompact ? Math.max(state.map.getZoom(), 8) : Math.max(state.map.getZoom(), 10), {
          animate: true,
          duration: 0.8
        });
      }, 200);
    }

    function drawPlacesMap() {
      clearMapLayers();

      ROUTE_DAYS.forEach(routeDay => {
        const coords = routeDay.stops.map(item => [item.lat, item.lng]);
        const line = L.polyline(coords, {
          color: routeDay.color,
          weight: 3,
          opacity: 0.28,
          dashArray: "6 10"
        }).addTo(state.map);
        state.routeLines.push(line);
      });

      const stops = visiblePlaces();
      stops.forEach(item => {
        const marker = L.marker([item.lat, item.lng], {
          icon: markerIcon(item.stopIndex + 1, state.placeKey === item.key, item.routeDay.color),
          title: item.name
        }).addTo(state.map);

        marker.on("click", () => selectPlace(item.key));
        state.markers.push(marker);
      });

      const selected = currentPlace();
      if (selected) {
        state.map.flyTo([selected.lat, selected.lng], Math.max(state.map.getZoom(), 10), {
          animate: true,
          duration: 0.6
        });
        return;
      }

      if (stops.length) {
        const bounds = L.latLngBounds(stops.map(item => [item.lat, item.lng]));
        const isCompact = window.matchMedia("(max-width: 860px)").matches;
        state.map.fitBounds(bounds, {
          paddingTopLeft: isCompact ? [28, 28] : [390, 110],
          paddingBottomRight: isCompact ? [28, 28] : [390, 110],
          animate: true,
          duration: 0.6
        });
      }
    }

    function progressCoords() {
      return day().stops.slice(0, state.stopIndex + 1).map(item => [item.lat, item.lng]);
    }

    function renderDayTabs() {
      els.dayTabs.innerHTML = ROUTE_DAYS.map((item, index) => `
        <button class="day-tab${index === state.dayIndex ? " active" : ""}" type="button" data-day="${index}">
          <strong>${item.day}</strong>
          <span>${item.short}</span>
        </button>
      `).join("");

      els.dayTabs.querySelectorAll(".day-tab").forEach(button => {
        button.addEventListener("click", () => {
          pause();
          state.dayIndex = Number(button.dataset.day);
          state.stopIndex = 0;
          render();
        });
      });
    }

    function renderSummary() {
      const currentDay = day();
      els.daySummary.innerHTML = `
        <h2>${currentDay.title}</h2>
        <p>${currentDay.summary}</p>
        <div class="day-stats">
          <div class="stat"><span>驾驶</span><strong>${currentDay.drive}</strong></div>
          <div class="stat"><span>距离</span><strong>${currentDay.distance}</strong></div>
          <div class="stat"><span>夜宿</span><strong>${currentDay.overnight}</strong></div>
        </div>
      `;
    }

    function renderStopList() {
      els.stopList.innerHTML = day().stops.map((item, index) => `
        <button class="stop-item${index === state.stopIndex ? " active" : ""}" type="button" data-stop="${index}" style="${colorForStop(state.dayIndex, index) ? `border-color:${colorForStop(state.dayIndex, index)}; background:rgba(255,255,255,.94);` : ""}">
          <span class="stop-index" style="background:${colorForStop(state.dayIndex, index) || (index === state.stopIndex ? day().color : "var(--road)")}">${index + 1}</span>
          <span class="stop-main">
            <span class="stop-topline">
              <span class="stop-time">${item.time}</span>
              <span class="stop-name">${item.name}</span>
            </span>
            <span class="stop-sub">${item.drive} · ${item.stay}</span>
          </span>
        </button>
      `).join("");

      els.stopList.querySelectorAll(".stop-item").forEach(button => {
        button.addEventListener("click", () => {
          pause();
          state.stopIndex = Number(button.dataset.stop);
          render();
        });
      });

      const active = els.stopList.querySelector(".stop-item.active");
      if (active) active.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }

    function renderDetail() {
      const item = stop();
      const tags = item.tags.map(tag => `<span>${tag}</span>`).join("");
      const currentComments = commentsFor();
      const editingComment = state.editingCommentId ? currentComments.find(comment => comment.id === state.editingCommentId && canEditComment(comment)) : null;
      const currentColor = colorForStop() || day().color;
      const mapsUrl = googleMapsUrl(item);
      const commentItems = currentComments.length
        ? currentComments.slice().reverse().map(comment => {
          const actions = canEditComment(comment) ? `
            <div class="comment-actions">
              <button class="comment-action" type="button" data-edit-comment="${escapeHtml(comment.id)}">修改</button>
              <button class="comment-action danger" type="button" data-delete-comment="${escapeHtml(comment.id)}">删除</button>
            </div>
          ` : "";
          return `
          <div class="comment-item" style="--comment-color:${comment.color}">
            <div class="comment-meta">
              <strong>${escapeHtml(comment.name)}</strong>
              <span>${formatCommentTime(comment.createdAt)}</span>
            </div>
            <p>${escapeHtml(comment.text)}</p>
            ${actions}
          </div>
        `;
        }).join("")
        : `<div class="comment-empty">还没有标记。选个颜色，留下名字和一句话就行。</div>`;
      const selectedColor = editingComment ? editingComment.color : COMMENT_COLORS[0];
      const colorOptions = COMMENT_COLORS.map(color => `
        <label title="标记颜色">
          <input type="radio" name="commentColor" value="${color}" ${color === selectedColor ? "checked" : ""}>
          <span class="color-dot" style="--comment-color:${color}"></span>
        </label>
      `).join("");
      els.detailPanel.innerHTML = `
        <div class="photo-strip" style="--photo:${PHOTO_GRADIENTS[state.dayIndex]}">
          <div class="photo-label">
            <strong><a class="map-link" href="${mapsUrl}" target="_blank" rel="noopener noreferrer" title="在 Google Maps 打开">${item.name}</a></strong>
            <span>${item.time}</span>
          </div>
        </div>
        <div class="detail-body">
          <div class="detail-meta">
            <span><a class="map-link" href="${mapsUrl}" target="_blank" rel="noopener noreferrer" title="在 Google Maps 打开">${item.place}</a></span>
            <span>${item.drive}</span>
            <span>${item.stay}</span>
            ${tags}
          </div>
          <p>${item.desc}</p>
          <div class="note" style="border-left-color:${currentColor}">${item.note}</div>
          <div class="comment-panel">
            <div class="comment-head">
              <strong>标记记录</strong>
              <span class="sync-status${syncEnabled() ? " online" : ""}">${state.syncStatus || (syncEnabled() ? "Google Sheet" : "本机记录")}</span>
              <span class="comment-count">${currentComments.length} 条</span>
            </div>
            <form id="commentForm" class="comment-form">
              <div class="comment-row">
                <input id="commentName" class="comment-input" type="text" maxlength="18" placeholder="名字，填一次会记住" value="${escapeHtml(editingComment ? editingComment.name : state.visitor.name)}">
                <div class="color-options">${colorOptions}</div>
              </div>
              <textarea id="commentText" class="comment-text" maxlength="80" placeholder="备注：必去 / 可删 / 备选 / 想住这里">${escapeHtml(editingComment ? editingComment.text : "")}</textarea>
              <button class="comment-submit" type="submit">${editingComment ? "保存修改" : "记录这个点"}</button>
              ${editingComment ? `<button id="cancelEditBtn" class="comment-cancel" type="button">取消修改</button>` : ""}
            </form>
            <div class="comment-list">${commentItems}</div>
          </div>
        </div>
      `;

      els.mapChip.innerHTML = `<strong>${day().day} · ${item.name}</strong><span>${item.time} / ${item.drive}</span>`;
      const form = document.getElementById("commentForm");
      if (form) form.addEventListener("submit", addComment);
      const cancelEditBtn = document.getElementById("cancelEditBtn");
      if (cancelEditBtn) {
        cancelEditBtn.addEventListener("click", () => {
          state.editingCommentId = null;
          renderDetail();
        });
      }
      document.querySelectorAll("[data-edit-comment]").forEach(button => {
        button.addEventListener("click", () => editComment(button.dataset.editComment));
      });
      document.querySelectorAll("[data-delete-comment]").forEach(button => {
        button.addEventListener("click", () => deleteComment(button.dataset.deleteComment));
      });
    }

    function renderTimeline() {
      const currentDay = day();
      const currentStop = stop();
      els.scrubber.max = currentDay.stops.length - 1;
      els.scrubber.value = state.stopIndex;
      els.timelineHead.innerHTML = `
        <strong>${currentStop.name}</strong>
        <span>${state.stopIndex + 1} / ${currentDay.stops.length} · ${currentDay.title}</span>
      `;
      els.miniStops.style.setProperty("--count", currentDay.stops.length);
      els.miniStops.innerHTML = currentDay.stops.map((_, index) => {
        const className = index === state.stopIndex ? "mini-stop active" : index < state.stopIndex ? "mini-stop done" : "mini-stop";
        return `<span class="${className}"></span>`;
      }).join("");
      els.playBtn.textContent = state.playing ? "Ⅱ" : "▶";
      els.playBtn.setAttribute("aria-label", state.playing ? "暂停路线" : "播放路线");
      els.playBtn.setAttribute("title", state.playing ? "暂停路线" : "播放路线");
    }

    function renderPlacesFilters() {
      const filters = [
        `<button class="place-filter${state.placeDay === "all" ? " active" : ""}" type="button" data-place-day="all">全部</button>`,
        ...ROUTE_DAYS.map((routeDay, index) => {
          const active = state.placeDay === String(index);
          return `<button class="place-filter${active ? " active" : ""}" style="--day-color:${routeDay.color}" type="button" data-place-day="${index}">${routeDay.day}</button>`;
        })
      ];

      els.placesFilter.innerHTML = filters.join("");
      els.placesFilter.querySelectorAll("[data-place-day]").forEach(button => {
        button.addEventListener("click", () => {
          state.placeDay = button.dataset.placeDay;
          state.placeKey = "";
          render();
        });
      });
    }

    function renderPlacesList() {
      const stops = visiblePlaces();
      const countText = state.placeDay === "all" ? `${stops.length} 个候选地点` : `${ROUTE_DAYS[Number(state.placeDay)].day} · ${stops.length} 个地点`;
      els.placesIntro.textContent = `${countText}，点击地点或地图 pin 查看详情。`;
      els.placesList.innerHTML = stops.map(item => `
        <button class="place-item${state.placeKey === item.key ? " active" : ""}" type="button" data-place-key="${item.key}">
          <span class="place-index" style="--day-color:${item.routeDay.color}">${item.stopIndex + 1}</span>
          <span>
            <span class="place-name">${escapeHtml(item.name)}</span>
            <span class="place-sub">${item.routeDay.day} · ${item.time} · ${escapeHtml(item.place)}</span>
          </span>
        </button>
      `).join("");

      els.placesList.querySelectorAll("[data-place-key]").forEach(button => {
        button.addEventListener("click", () => selectPlace(button.dataset.placeKey));
      });

      const active = els.placesList.querySelector(".place-item.active");
      if (active) active.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }

    function renderPlacesCard() {
      const item = currentPlace();
      if (!item) {
        els.placesCard.hidden = true;
        els.mapChip.innerHTML = `<strong>全地点地图</strong><span>${visiblePlaces().length} 个候选地点</span>`;
        return;
      }

      els.mapChip.innerHTML = `<strong>${item.routeDay.day} · ${escapeHtml(item.name)}</strong><span>${item.time} / ${item.drive}</span>`;
      els.placesCard.hidden = false;
      els.placesCard.innerHTML = `
        <div class="places-band" style="--day-color:${item.routeDay.color}"></div>
        <div class="places-card-body">
          <h2>${escapeHtml(item.name)}</h2>
          <div class="places-meta">
            <span>${item.routeDay.day}</span>
            <span>${item.time}</span>
            <span>${item.drive}</span>
            <span>${item.stay}</span>
          </div>
          <p>${escapeHtml(item.desc)}</p>
          <div class="places-actions">
            <a href="${googleMapsUrl(item)}" target="_blank" rel="noopener noreferrer">Google Maps</a>
            <a href="#route-${item.dayIndex}-${item.stopIndex}" data-open-route="${item.key}">在路线里看</a>
            <button type="button" data-close-place>关闭</button>
          </div>
        </div>
      `;

      const routeButton = els.placesCard.querySelector("[data-open-route]");
      if (routeButton) {
        routeButton.addEventListener("click", () => {
          openRouteStop(item.dayIndex, item.stopIndex);
        });
      }

      const closeButton = els.placesCard.querySelector("[data-close-place]");
      if (closeButton) {
        closeButton.addEventListener("click", () => {
          state.placeKey = "";
          render();
        });
      }
    }

    function renderPlaces() {
      renderPlacesFilters();
      renderPlacesList();
      renderPlacesCard();
    }

    function renderViewChrome() {
      const isPlaces = state.view === "places";
      document.body.dataset.view = state.view;
      els.routePanel.hidden = isPlaces;
      els.detailPanel.hidden = isPlaces;
      els.routePlayer.hidden = isPlaces;
      els.placesPanel.hidden = !isPlaces;
      els.routeViewLink.classList.toggle("active", !isPlaces);
      els.placesViewLink.classList.toggle("active", isPlaces);
      if (!isPlaces) {
        els.placesCard.hidden = true;
      }
    }

    function render() {
      renderVisitor();
      renderViewChrome();
      if (state.view === "places") {
        renderPlaces();
        drawMap();
        return;
      }
      renderDayTabs();
      renderSummary();
      renderStopList();
      renderDetail();
      renderTimeline();
      drawMap();
    }

    function selectPlace(key) {
      const item = allStops().find(stopItem => stopItem.key === key);
      if (!item) return;
      pause();
      state.placeKey = key;
      render();
    }

    function openRouteStop(dayIndex, stopIndex) {
      pause();
      state.dayIndex = dayIndex;
      state.stopIndex = stopIndex;
      state.view = "route";
      const nextHash = `#route-${dayIndex}-${stopIndex}`;
      if (location.hash !== nextHash) {
        location.hash = nextHash;
      }
      render();
      if (state.mapReady) {
        setTimeout(() => state.map.invalidateSize(), 50);
      }
    }

    function syncViewFromHash() {
      const nextView = location.hash === "#places" ? "places" : "route";
      const routeTarget = routeTargetFromHash();
      const sameRouteTarget = !routeTarget || (state.dayIndex === routeTarget.dayIndex && state.stopIndex === routeTarget.stopIndex);
      if (state.view === nextView && sameRouteTarget) return;
      pause();
      state.view = nextView;
      if (routeTarget) {
        state.dayIndex = routeTarget.dayIndex;
        state.stopIndex = routeTarget.stopIndex;
      }
      state.editingCommentId = null;
      render();
      if (state.mapReady) {
        setTimeout(() => state.map.invalidateSize(), 50);
      }
    }

    async function addComment(event) {
      event.preventDefault();
      const nameInput = document.getElementById("commentName");
      const textInput = document.getElementById("commentText");
      const colorInput = document.querySelector('input[name="commentColor"]:checked');
      const typedName = nameInput.value.trim();
      if (typedName) {
        setVisitorName(typedName);
      }
      const name = state.visitor.name || "未署名";
      const text = textInput.value.trim() || "已标记";
      const key = stopKey();
      const currentDay = day();
      const currentStop = state.stopIndex;
      const currentItem = stop();

      if (state.editingCommentId) {
        await saveEditedComment({
          key,
          id: state.editingCommentId,
          name,
          text,
          color: colorInput ? colorInput.value : COMMENT_COLORS[0]
        });
        return;
      }

      const nextComment = {
        id: `${state.visitor.id}-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        visitorId: state.visitor.id,
        name,
        text,
        color: colorInput ? colorInput.value : COMMENT_COLORS[0],
        createdAt: new Date().toISOString()
      };

      state.comments[key] = [...commentsFor(), nextComment];
      saveComments();
      render();
      syncComment(key, nextComment, currentDay, currentStop, currentItem);
    }

    async function saveEditedComment({ key, id, name, text, color }) {
      const comment = findCurrentComment(id);
      if (!comment) return;

      const updatedComment = {
        ...comment,
        name,
        text,
        color,
        updatedAt: new Date().toISOString()
      };

      updateLocalComment(key, id, () => updatedComment);
      state.editingCommentId = null;
      saveComments();
      render();

      try {
        await syncCommentChange("update", { routeKey: key, comment: updatedComment });
      } catch (error) {
        state.syncStatus = "修改已保存在本机，远端同步失败";
        renderDetail();
      }
    }

    function findCurrentComment(commentId) {
      return commentsFor().find(comment => comment.id === commentId && canEditComment(comment));
    }

    function editComment(commentId) {
      const comment = findCurrentComment(commentId);
      if (!comment) return;
      state.editingCommentId = commentId;
      renderDetail();
    }

    async function deleteComment(commentId) {
      const key = stopKey();
      const comment = findCurrentComment(commentId);
      if (!comment) return;
      const ok = window.confirm("删除这条标记记录？");
      if (!ok) return;

      try {
        if (syncEnabled()) {
          state.syncStatus = "正在删除远端记录";
          renderDetail();
          await syncCommentChange("delete", { routeKey: key, comment });
        }
        removeLocalComment(key, commentId);
        state.editingCommentId = null;
        render();
      } catch (error) {
        if (error.message === "remote_comment_not_found") {
          removeLocalComment(key, commentId);
          state.editingCommentId = null;
          state.syncStatus = "远端未找到，本机已删除";
          render();
          return;
        }
        state.syncStatus = "删除失败：远端记录未删除";
        renderDetail();
      }
    }

    function goNext() {
      const lastStop = day().stops.length - 1;
      if (state.stopIndex < lastStop) {
        state.stopIndex += 1;
      } else if (state.dayIndex < ROUTE_DAYS.length - 1) {
        state.dayIndex += 1;
        state.stopIndex = 0;
      } else {
        pause();
        return;
      }
      render();
    }

    function goPrev() {
      if (state.stopIndex > 0) {
        state.stopIndex -= 1;
      } else if (state.dayIndex > 0) {
        state.dayIndex -= 1;
        state.stopIndex = ROUTE_DAYS[state.dayIndex].stops.length - 1;
      }
      render();
    }

    function play() {
      pause(false);
      state.playing = true;
      renderTimeline();
      state.timer = window.setInterval(goNext, Number(els.speedSelect.value));
    }

    function pause(update = true) {
      state.playing = false;
      if (state.timer) {
        window.clearInterval(state.timer);
        state.timer = null;
      }
      if (update) renderTimeline();
    }

    els.playBtn.addEventListener("click", () => {
      if (state.playing) {
        pause();
      } else {
        play();
      }
    });

    els.prevBtn.addEventListener("click", () => {
      pause();
      goPrev();
    });

    els.nextBtn.addEventListener("click", () => {
      pause();
      goNext();
    });

    els.resetBtn.addEventListener("click", () => {
      pause();
      state.dayIndex = 0;
      state.stopIndex = 0;
      render();
    });

    els.scrubber.addEventListener("input", event => {
      pause();
      state.stopIndex = Number(event.target.value);
      render();
    });

    els.speedSelect.addEventListener("change", () => {
      if (state.playing) play();
    });

    els.visitorBtn.addEventListener("click", () => {
      const nextName = window.prompt("输入这台浏览器要记住的名字", state.visitor.name || "");
      if (nextName !== null) {
        setVisitorName(nextName);
        renderDetail();
      }
    });

    window.addEventListener("hashchange", syncViewFromHash);

    window.addEventListener("resize", () => {
      if (state.mapReady) {
        state.map.invalidateSize();
      }
    });

    render();
    initMap();
    refreshSyncedComments();
    if (syncEnabled()) {
      window.setInterval(refreshSyncedComments, SYNC_REFRESH_MS);
    }
  </script>
</body>
</html>
