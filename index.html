<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鸟取・岛根・山口自驾路线广度预览</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://tile.openstreetmap.org">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: light;
      --ink: #17212b;
      --muted: #66737f;
      --line: #d8e0e7;
      --panel: rgba(255, 255, 255, 0.94);
      --panel-strong: #ffffff;
      --shadow: 0 18px 60px rgba(24, 38, 52, 0.16);
      --blue: #2563eb;
      --blue-soft: #e8f0ff;
      --green: #0f8b70;
      --orange: #d8692a;
      --plum: #8a3ffc;
      --sea: #1f9bb4;
      --sand: #f2c66d;
      --road: #293241;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: Inter, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background: #eaf0f5;
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 640px;
      background: #dfeaf0;
    }

    #map {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(110deg, rgba(248, 224, 163, 0.6), rgba(137, 197, 204, 0.35)),
        #dce9ee;
      z-index: 0;
    }

    #map::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0.12) 34%, rgba(255, 255, 255, 0.2) 100%),
        radial-gradient(circle at 78% 18%, rgba(255, 255, 255, 0.55), transparent 24%);
      z-index: 401;
    }

    .map-fallback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      color: #22313c;
      background:
        linear-gradient(135deg, rgba(242, 198, 109, 0.55), rgba(31, 155, 180, 0.38)),
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.2) 0 1px, transparent 1px 18px);
      z-index: 1;
    }

    .map-fallback[hidden] {
      display: none;
    }

    .fallback-inner {
      width: min(620px, 92vw);
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .shell {
      position: relative;
      z-index: 700;
      display: grid;
      grid-template-columns: minmax(300px, 360px) minmax(0, 1fr) minmax(300px, 360px);
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 14px;
      height: 100%;
      padding: 16px;
      pointer-events: none;
    }

    .topbar,
    .side-panel,
    .detail-panel,
    .player {
      pointer-events: auto;
      border: 1px solid rgba(216, 224, 231, 0.88);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .topbar {
      grid-column: 1 / 4;
      position: relative;
      z-index: 4;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      border-radius: var(--radius);
    }

    .title-block {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--green);
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .route-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #33414d;
      background: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      white-space: nowrap;
    }

    button.meta-pill {
      justify-content: center;
    }

    a.meta-pill {
      text-decoration: none;
    }

    .visitor-pill {
      color: #0b3f6f;
      background: var(--blue-soft);
      border-color: rgba(37, 99, 235, 0.24);
      font-weight: 800;
    }

    .pin-pill.active {
      color: #fff;
      border-color: var(--plum);
      background: var(--plum);
      font-weight: 800;
    }

    .side-panel {
      position: relative;
      z-index: 2;
      grid-column: 1;
      grid-row: 2;
      align-self: stretch;
      min-height: 0;
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .day-tabs {
      display: flex;
      overflow-x: auto;
      border-bottom: 1px solid var(--line);
      background: rgba(248, 251, 253, 0.9);
      scrollbar-width: thin;
    }

    .day-tab {
      flex: 0 0 112px;
      min-height: 54px;
      padding: 8px 6px;
      color: #485560;
      background: transparent;
      border-right: 1px solid var(--line);
      text-align: center;
    }

    .day-tab:last-child {
      border-right: 0;
    }

    .day-tab strong {
      display: block;
      font-size: 13px;
      line-height: 1.2;
    }

    .day-tab span {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .day-tab.active {
      color: #0b3f6f;
      background: var(--blue-soft);
      box-shadow: inset 0 -3px 0 var(--blue);
    }

    .day-summary {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
    }

    .day-summary h2 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .day-summary p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .day-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .stat {
      min-width: 0;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .stat strong {
      display: block;
      margin-top: 3px;
      font-size: 14px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .stop-list {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .stop-item {
      width: 100%;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 10px;
      padding: 10px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: inherit;
      background: transparent;
      text-align: left;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .stop-item + .stop-item {
      margin-top: 6px;
    }

    .stop-item:hover,
    .stop-item.active {
      border-color: rgba(37, 99, 235, 0.28);
      background: rgba(232, 240, 255, 0.88);
      transform: translateY(-1px);
    }

    .stop-index {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: #fff;
      background: var(--road);
      font-size: 14px;
      font-weight: 800;
    }

    .stop-main {
      min-width: 0;
    }

    .stop-topline {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .stop-time {
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .stop-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 800;
    }

    .map-link {
      color: inherit;
      text-decoration: none;
    }

    .map-link:hover {
      text-decoration: underline;
    }

    .stop-sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .map-chip {
      position: absolute;
      left: 50%;
      top: 96px;
      z-index: 6;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      max-width: min(540px, calc(100vw - 760px));
      min-height: 40px;
      padding: 8px 12px;
      border: 1px solid rgba(216, 224, 231, 0.88);
      border-radius: 999px;
      color: #26333e;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 12px 36px rgba(24, 38, 52, 0.14);
      pointer-events: auto;
      backdrop-filter: blur(18px);
    }

    .map-chip strong,
    .map-chip span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .map-chip strong {
      font-size: 13px;
    }

    .map-chip span {
      color: var(--muted);
      font-size: 12px;
    }

    .detail-panel {
      position: relative;
      z-index: 2;
      grid-column: 3;
      grid-row: 2;
      align-self: end;
      border-radius: var(--radius);
      overflow: hidden;
    }

    .photo-strip {
      position: relative;
      min-height: 168px;
      background:
        linear-gradient(135deg, rgba(23, 33, 43, 0.08), transparent),
        linear-gradient(120deg, var(--sand), var(--sea));
      overflow: hidden;
    }

    .photo-strip::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, transparent 42%, rgba(0, 0, 0, 0.48)),
        var(--photo, linear-gradient(120deg, var(--sand), var(--sea)));
      background-size: cover;
      background-position: center;
      filter: saturate(1.02);
      transform: scale(1.01);
    }

    .photo-label {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 12px;
      z-index: 1;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      color: #fff;
    }

    .photo-label strong {
      display: block;
      font-size: 22px;
      line-height: 1.15;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.32);
    }

    .photo-label .map-link {
      color: #fff;
    }

    .photo-label span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.22);
      font-size: 12px;
      white-space: nowrap;
      backdrop-filter: blur(10px);
    }

    .detail-body {
      padding: 16px;
      background: var(--panel-strong);
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .detail-meta span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 8px;
      border-radius: 999px;
      background: #f1f5f7;
      color: #485560;
      font-size: 12px;
    }

    .detail-body p {
      margin: 0;
      color: #34414d;
      font-size: 14px;
      line-height: 1.65;
    }

    .note {
      margin-top: 14px;
      padding: 10px 11px;
      border-left: 3px solid var(--orange);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: #5b3d24;
      background: #fff4e7;
      font-size: 13px;
      line-height: 1.5;
    }

    .comment-panel {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .comment-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .comment-head strong {
      font-size: 13px;
    }

    .comment-count {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .sync-status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 8px;
      border-radius: 999px;
      color: #485560;
      background: #eef3f7;
      font-size: 12px;
      white-space: nowrap;
    }

    .sync-status.online {
      color: #0f6b57;
      background: #e6f7f1;
    }

    .comment-form {
      display: grid;
      gap: 8px;
    }

    .comment-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .comment-input,
    .comment-text {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: #fff;
      outline: 0;
    }

    .comment-input {
      height: 36px;
      padding: 0 10px;
    }

    .comment-text {
      min-height: 58px;
      resize: vertical;
      padding: 9px 10px;
      line-height: 1.45;
    }

    .comment-input:focus,
    .comment-text:focus {
      border-color: rgba(37, 99, 235, 0.52);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .color-options {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .color-options input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .color-dot {
      width: 24px;
      height: 24px;
      display: block;
      border: 2px solid #fff;
      border-radius: 999px;
      background: var(--comment-color);
      box-shadow: 0 0 0 1px rgba(23, 33, 43, 0.16);
      cursor: pointer;
    }

    .color-options input:checked + .color-dot {
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.22), 0 0 0 1px rgba(23, 33, 43, 0.18);
      transform: scale(1.08);
    }

    .comment-submit {
      height: 36px;
      border-radius: var(--radius);
      color: #fff;
      background: var(--blue);
      font-size: 13px;
      font-weight: 800;
    }

    .comment-cancel {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #34414d;
      background: #fff;
      font-size: 13px;
      font-weight: 800;
    }

    .comment-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .comment-item {
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--comment-color);
      border-radius: var(--radius);
      background: #f8fbfd;
    }

    .comment-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .comment-meta strong {
      color: #26333e;
      font-size: 12px;
    }

    .comment-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .comment-action {
      min-height: 28px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #34414d;
      background: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .comment-action.danger {
      color: #9f1239;
      border-color: rgba(159, 18, 57, 0.24);
      background: #fff1f2;
    }

    .comment-item p {
      margin: 0;
      color: #34414d;
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .comment-empty {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .player {
      grid-column: 1 / 4;
      grid-row: 3;
      display: grid;
      grid-template-columns: auto minmax(180px, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 12px;
      border-radius: var(--radius);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #22313c;
      background: #fff;
      font-size: 18px;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .icon-btn:hover {
      border-color: rgba(37, 99, 235, 0.4);
      background: var(--blue-soft);
      transform: translateY(-1px);
    }

    .icon-btn.primary {
      width: 48px;
      color: #fff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .timeline-wrap {
      min-width: 0;
    }

    .timeline-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .timeline-head strong,
    .timeline-head span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .timeline-head span {
      color: var(--muted);
    }

    .scrubber {
      width: 100%;
      accent-color: var(--blue);
    }

    .mini-stops {
      display: grid;
      grid-template-columns: repeat(var(--count), minmax(18px, 1fr));
      gap: 4px;
      margin-top: 7px;
    }

    .mini-stop {
      height: 5px;
      border-radius: 999px;
      background: #cbd5df;
      transition: background 160ms ease, transform 160ms ease;
    }

    .mini-stop.done {
      background: var(--green);
    }

    .mini-stop.active {
      background: var(--orange);
      transform: scaleY(1.45);
    }

    .player-tools {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-end;
    }

    .select {
      height: 40px;
      min-width: 116px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #22313c;
      background: #fff;
    }

    .leaflet-control-attribution {
      font-size: 10px;
    }

    .custom-marker {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 2px solid #fff;
      border-radius: 999px;
      color: #fff;
      background: var(--road);
      box-shadow: 0 8px 22px rgba(27, 38, 49, 0.26);
      font-size: 12px;
      font-weight: 800;
    }

    .custom-marker.active {
      width: 40px;
      height: 40px;
      background: var(--orange);
      box-shadow: 0 14px 30px rgba(216, 105, 42, 0.34);
    }

    .moving-marker {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 3px solid #fff;
      border-radius: 999px;
      color: #fff;
      background: var(--blue);
      box-shadow: 0 12px 32px rgba(37, 99, 235, 0.36);
      font-size: 16px;
      font-weight: 900;
    }

    .map-page {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 640px;
      color: var(--ink);
      background: #dfeaf0;
    }

    .map-page[hidden] {
      display: none;
    }

    #placesMap {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: #dce9ee;
    }

    .places-shell {
      position: relative;
      z-index: 700;
      display: grid;
      grid-template-columns: minmax(320px, 380px) minmax(0, 1fr);
      gap: 14px;
      height: 100%;
      padding: 14px;
      pointer-events: none;
    }

    .places-panel,
    .places-card,
    .places-chip {
      pointer-events: auto;
      border: 1px solid rgba(216, 224, 231, 0.9);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .places-panel {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .places-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .places-head h1 {
      font-size: 22px;
    }

    .places-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .places-filter {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      scrollbar-width: thin;
    }

    .places-filter-btn {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #40505d;
      background: #fff;
      font-size: 12px;
      font-weight: 800;
    }

    .places-filter-btn.active {
      color: #fff;
      border-color: var(--day-color, var(--blue));
      background: var(--day-color, var(--blue));
    }

    .places-list {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .places-item {
      width: 100%;
      display: grid;
