<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>全地点地图｜鸟取・岛根・山口自驾游</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --ink: #17212b;
      --muted: #66737f;
      --line: #d8e0e7;
      --panel: rgba(255, 255, 255, 0.94);
      --blue: #2563eb;
      --blue-soft: #e8f0ff;
      --road: #293241;
      --radius: 8px;
      --shadow: 0 18px 60px rgba(24, 38, 52, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: Inter, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: #eaf0f5;
      overflow: hidden;
    }

    button,
    a {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    a {
      color: inherit;
    }

    #map {
      position: fixed;
      inset: 0;
      background: #dce9ee;
    }

    .shell {
      position: relative;
      z-index: 5;
      display: grid;
      grid-template-columns: minmax(320px, 380px) minmax(0, 1fr);
      height: 100%;
      padding: 14px;
      gap: 14px;
      pointer-events: none;
    }

    .panel,
    .place-card,
    .top-chip {
      pointer-events: auto;
      border: 1px solid rgba(216, 224, 231, 0.9);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .panel-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 4px;
      color: #0f8b70;
      font-size: 12px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .nav-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #33414d;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .pill.active {
      color: #0b3f6f;
      border-color: rgba(37, 99, 235, 0.28);
      background: var(--blue-soft);
    }

    .filter-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      scrollbar-width: thin;
    }

    .day-filter {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #40505d;
      background: #fff;
      font-size: 12px;
      font-weight: 800;
    }

    .day-filter.active {
      color: #fff;
      background: var(--day-color, var(--blue));
      border-color: var(--day-color, var(--blue));
    }

    .stop-list {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .stop-item {
      width: 100%;
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
      padding: 9px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: inherit;
      background: transparent;
      text-align: left;
    }

    .stop-item + .stop-item {
      margin-top: 5px;
    }

    .stop-item:hover,
    .stop-item.active {
      border-color: rgba(37, 99, 235, 0.26);
      background: rgba(232, 240, 255, 0.9);
    }

    .stop-index {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: #fff;
      background: var(--day-color, var(--road));
      font-size: 12px;
      font-weight: 900;
    }

    .stop-name {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 850;
    }

    .stop-sub {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .top-chip {
      justify-self: center;
      align-self: start;
      max-width: min(620px, 100%);
      padding: 9px 12px;
      color: #34414d;
      font-size: 13px;
    }

    .place-card {
      position: absolute;
      right: 14px;
      bottom: 14px;
      width: min(360px, calc(100vw - 420px));
      overflow: hidden;
    }

    .place-card[hidden] {
      display: none;
    }

    .card-band {
      min-height: 8px;
      background: var(--day-color, var(--blue));
    }

    .card-body {
      padding: 14px;
    }

    .card-body h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0;
    }

    .card-meta span {
      display: inline-flex;
      min-height: 26px;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      color: #485560;
      background: #f1f5f7;
      font-size: 12px;
    }

    .card-body p {
      margin: 0;
      color: #34414d;
      font-size: 13px;
      line-height: 1.55;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .card-actions a,
    .card-actions button {
      flex: 1;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .maps-btn {
      color: #fff;
      background: var(--blue);
    }

    .close-btn {
      border: 1px solid var(--line);
      color: #34414d;
      background: #fff;
    }

    .custom-marker {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 2px solid #fff;
      border-radius: 999px;
      color: #fff;
      background: var(--day-color, var(--road));
      box-shadow: 0 8px 22px rgba(27, 38, 49, 0.26);
      font-size: 12px;
      font-weight: 900;
    }

    .custom-marker.active {
      width: 40px;
      height: 40px;
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.34);
    }

    @media (max-width: 860px) {
      html,
      body {
        overflow: auto;
      }

      #map {
        position: relative;
        height: 46dvh;
        min-height: 310px;
      }

      .shell {
        display: flex;
        flex-direction: column;
        height: auto;
        min-height: 100dvh;
        padding: 10px;
      }

      .top-chip {
        order: 1;
        justify-self: auto;
        align-self: stretch;
      }

      .panel {
        order: 2;
        max-height: none;
      }

      .stop-list {
        max-height: 42dvh;
      }

      .place-card {
        position: relative;
        order: 3;
        right: auto;
        bottom: auto;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <main class="shell">
    <aside class="panel">
      <header class="panel-head">
        <p class="eyebrow">All Places Map</p>
        <h1>全地点地图</h1>
        <div class="nav-row">
          <a class="pill" href="./index.html">路线预览</a>
          <span id="placeCount" class="pill active"></span>
        </div>
      </header>
      <nav id="filterRow" class="filter-row" aria-label="按天筛选地点"></nav>
      <div id="stopList" class="stop-list"></div>
    </aside>
    <div id="topChip" class="top-chip"></div>
    <article id="placeCard" class="place-card" hidden></article>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./trip-data.js"></script>
  <script>
    const { routeDays: ROUTE_DAYS } = window.TRIP_DATA;
    const state = {
      map: null,
      markers: [],
      activeDay: "all",
      activeKey: ""
    };

    const els = {
      filterRow: document.getElementById("filterRow"),
      stopList: document.getElementById("stopList"),
      placeCard: document.getElementById("placeCard"),
      topChip: document.getElementById("topChip"),
      placeCount: document.getElementById("placeCount")
    };

    function allStops() {
      return ROUTE_DAYS.flatMap((day, dayIndex) => {
        return day.stops.map((stop, stopIndex) => ({
          ...stop,
          key: `${day.day}-${stopIndex}`,
          day,
          dayIndex,
          stopIndex
        }));
      });
    }

    function visibleStops() {
      const stops = allStops();
      if (state.activeDay === "all") return stops;
      return stops.filter(stop => stop.dayIndex === Number(state.activeDay));
    }

    function googleMapsUrl(item) {
      const query = encodeURIComponent(`${item.place || item.name} ${item.lat},${item.lng}`);
      return `https://www.google.com/maps/search/?api=1&query=${query}`;
    }

    function markerIcon(stop, active) {
      return L.divIcon({
        className: "",
        html: `<div class="custom-marker${active ? " active" : ""}" style="--day-color:${stop.day.color}">${stop.stopIndex + 1}</div>`,
        iconSize: active ? [40, 40] : [30, 30],
        iconAnchor: active ? [20, 20] : [15, 15]
      });
    }

    function initMap() {
      state.map = L.map("map", {
        zoomControl: false,
        scrollWheelZoom: true
      }).setView([35.1, 132.6], 8);

      L.control.zoom({ position: "bottomright" }).addTo(state.map);
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 18,
        attribution: "&copy; OpenStreetMap"
      }).addTo(state.map);
    }

    function renderFilters() {
      const filters = [
        `<button class="day-filter${state.activeDay === "all" ? " active" : ""}" type="button" data-day="all">全部</button>`,
        ...ROUTE_DAYS.map((day, index) => {
          const active = state.activeDay === String(index);
          return `<button class="day-filter${active ? " active" : ""}" style="--day-color:${day.color}" type="button" data-day="${index}">${day.day}</button>`;
        })
      ];

      els.filterRow.innerHTML = filters.join("");
      els.filterRow.querySelectorAll("[data-day]").forEach(button => {
        button.addEventListener("click", () => {
          state.activeDay = button.dataset.day;
          state.activeKey = "";
          render();
        });
      });
    }

    function renderList() {
      const stops = visibleStops();
      els.placeCount.textContent = `${stops.length} 个地点`;
      els.stopList.innerHTML = stops.map(stop => `
        <button class="stop-item${state.activeKey === stop.key ? " active" : ""}" type="button" data-key="${stop.key}">
          <span class="stop-index" style="--day-color:${stop.day.color}">${stop.stopIndex + 1}</span>
          <span>
            <span class="stop-name">${stop.name}</span>
            <span class="stop-sub">${stop.day.day} · ${stop.time} · ${stop.place}</span>
          </span>
        </button>
      `).join("");

      els.stopList.querySelectorAll("[data-key]").forEach(button => {
        button.addEventListener("click", () => {
          selectStop(button.dataset.key);
        });
      });
    }

    function renderMarkers() {
      state.markers.forEach(marker => marker.remove());
      state.markers = [];

      const stops = visibleStops();
      stops.forEach(stop => {
        const marker = L.marker([stop.lat, stop.lng], {
          icon: markerIcon(stop, state.activeKey === stop.key),
          title: stop.name
        }).addTo(state.map);

        marker.on("click", () => selectStop(stop.key));
        state.markers.push(marker);
      });

      if (stops.length && !state.activeKey) {
        const bounds = L.latLngBounds(stops.map(stop => [stop.lat, stop.lng]));
        state.map.fitBounds(bounds, {
          padding: window.matchMedia("(max-width: 860px)").matches ? [28, 28] : [420, 80],
          animate: true,
          duration: 0.5
        });
      }
    }

    function renderCard() {
      const stop = allStops().find(item => item.key === state.activeKey);
      if (!stop) {
        els.placeCard.hidden = true;
        els.topChip.textContent = state.activeDay === "all" ? "显示全部候选地点，点击左侧地点或地图 pin 查看详情。" : "显示当前天数地点，点击地点或 pin 查看详情。";
        return;
      }

      els.topChip.textContent = `${stop.day.day} · ${stop.name}`;
      els.placeCard.hidden = false;
      els.placeCard.innerHTML = `
        <div class="card-band" style="--day-color:${stop.day.color}"></div>
        <div class="card-body">
          <h2>${stop.name}</h2>
          <div class="card-meta">
            <span>${stop.day.day}</span>
            <span>${stop.time}</span>
            <span>${stop.drive}</span>
            <span>${stop.stay}</span>
          </div>
          <p>${stop.desc}</p>
          <div class="card-actions">
            <a class="maps-btn" href="${googleMapsUrl(stop)}" target="_blank" rel="noopener noreferrer">Google Maps</a>
            <button class="close-btn" type="button" id="closeCard">关闭</button>
          </div>
        </div>
      `;
      document.getElementById("closeCard").addEventListener("click", () => {
        state.activeKey = "";
        render();
      });
    }

    function selectStop(key) {
      const stop = allStops().find(item => item.key === key);
      if (!stop) return;
      state.activeKey = key;
      state.map.flyTo([stop.lat, stop.lng], Math.max(state.map.getZoom(), 10), {
        animate: true,
        duration: 0.6
      });
      render();
    }

    function render() {
      renderFilters();
      renderList();
      renderMarkers();
      renderCard();
    }

    initMap();
    render();
    window.addEventListener("resize", () => {
      state.map.invalidateSize();
    });
  </script>
</body>
</html>
